name: Read responsive audit log

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/read-responsive-audit-log.yml'

permissions:
  actions: read
  contents: read

jobs:
  read-log:
    runs-on: ubuntu-latest
    steps:
      - name: Print failed audit job tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${GITHUB_REPOSITORY}/actions/jobs/88720037856/logs > /tmp/audit.log
          echo '===== RESPONSIVE AUDIT FINAL 35 LINES ====='
          tail -n 35 /tmp/audit.log
