name: Read responsive audit log

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/read-responsive-audit-log.yml'

permissions:
  actions: read
  issues: write
  contents: read

jobs:
  read-log:
    runs-on: ubuntu-latest
    steps:
      - name: Download failed audit job log
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api repos/${GITHUB_REPOSITORY}/actions/jobs/88720037856/logs > /tmp/audit.log
          tail -n 120 /tmp/audit.log > /tmp/audit-tail.txt

      - name: Publish diagnostic tail
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          from pathlib import Path
          tail = Path('/tmp/audit-tail.txt').read_text(errors='replace')
          body = '<!-- responsive-audit-log-tail -->\n## Временная диагностика responsive-аудита\n\n```text\n' + tail[-50000:] + '\n```'
          Path('/tmp/comment.md').write_text(body)
          PY
          existing=$(gh api repos/${GITHUB_REPOSITORY}/issues/31/comments --paginate --jq '.[] | select(.body | contains("responsive-audit-log-tail")) | .id' | head -n 1)
          if [ -n "$existing" ]; then
            jq -n --rawfile body /tmp/comment.md '{body:$body}' | gh api --method PATCH repos/${GITHUB_REPOSITORY}/issues/comments/$existing --input -
          else
            jq -n --rawfile body /tmp/comment.md '{body:$body}' | gh api --method POST repos/${GITHUB_REPOSITORY}/issues/31/comments --input -
          fi
