name: Source acquisition 49 index resolver

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

jobs:
  resolve-and-verify:
    name: resolve ${{ matrix.source.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        source:
          - id: esenin-chronicle-v5-book1-2013-mirror
            index: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
            must_contain: Том 5. Книга 1. Январь 1925
            year: "2013"
          - id: esenin-chronicle-v5-book2-2018
            index: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
            must_contain: Том 5. Книга 2. 24 декабря 1925
            year: "2018"
          - id: mayakovsky-death-case-2005
            index: https://publ.lib.ru/ARCHIVES/M/MAYAKOVSKIY_Vladimir_Vladimirovich/
            must_contain: Следственное дело В.В.Маяковского
            year: "2005"

    env:
      SOURCE_ID: ${{ matrix.source.id }}
      INDEX_URL: ${{ matrix.source.index }}
      MUST_CONTAIN: ${{ matrix.source.must_contain }}
      TARGET_YEAR: ${{ matrix.source.year }}

    steps:
      - uses: actions/checkout@v4

      - name: Install verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qpdf poppler-utils

      - name: Fetch index and resolve exact href
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "index-resolver/$SOURCE_ID"
          dir="index-resolver/$SOURCE_ID"
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 --max-time 300 \
            --user-agent 'Mozilla/5.0 source-index-resolver/1.0' \
            --dump-header "$dir/index-headers.txt" \
            --output "$dir/index.raw" \
            "$INDEX_URL"

          python3 - <<'PY'
          from __future__ import annotations

          import html.parser
          import json
          import os
          import pathlib
          import urllib.parse

          source_id = os.environ['SOURCE_ID']
          index_url = os.environ['INDEX_URL']
          needle = os.environ['MUST_CONTAIN']
          target_year = os.environ['TARGET_YEAR']
          root = pathlib.Path('index-resolver') / source_id
          raw = (root / 'index.raw').read_bytes()

          decoded = None
          used_encoding = None
          for encoding in ('utf-8', 'cp1251', 'windows-1251', 'koi8-r', 'latin-1'):
              try:
                  candidate = raw.decode(encoding)
              except UnicodeDecodeError:
                  continue
              if '.pdf' in candidate.lower():
                  decoded = candidate
                  used_encoding = encoding
                  break
          if decoded is None:
              raise RuntimeError('unable to decode directory index')

          class Links(html.parser.HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.hrefs: list[str] = []
              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  if tag.lower() != 'a':
                      return
                  for key, value in attrs:
                      if key.lower() == 'href' and value:
                          self.hrefs.append(value)

          parser = Links()
          parser.feed(decoded)
          candidates: list[dict[str, str]] = []
          for href in parser.hrefs:
              display = urllib.parse.unquote(href)
              if not display.lower().endswith('.pdf'):
                  continue
              if needle.casefold() not in display.casefold() or target_year not in display:
                  continue
              absolute = urllib.parse.urljoin(index_url, href)
              parts = urllib.parse.urlsplit(absolute)
              safe_path = urllib.parse.quote(urllib.parse.unquote(parts.path), safe='/%[]_-.,')
              resolved = urllib.parse.urlunsplit((parts.scheme, parts.netloc, safe_path, parts.query, parts.fragment))
              candidates.append({'href': href, 'display': display, 'resolved_url': resolved})

          report = {
              'source_id': source_id,
              'index_url': index_url,
              'encoding': used_encoding,
              'needle': needle,
              'target_year': target_year,
              'candidate_count': len(candidates),
              'candidates': candidates,
          }
          (root / 'index-decoded.html').write_text(decoded, encoding='utf-8')
          (root / 'resolution.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          if len(candidates) != 1:
              raise RuntimeError(f'expected exactly one candidate, got {len(candidates)}')
          (root / 'resolved-url.txt').write_text(candidates[0]['resolved_url'] + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Download resolved PDF
        shell: bash
        run: |
          set -euo pipefail
          dir="index-resolver/$SOURCE_ID"
          url="$(cat "$dir/resolved-url.txt")"
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 --max-time 3600 \
            --user-agent 'Mozilla/5.0 source-index-resolver/1.0' \
            --referer "$INDEX_URL" \
            --output "$dir/source.pdf" \
            "$url"
          test "$(head -c 5 "$dir/source.pdf")" = '%PDF-'
          stat --printf='%s\n' "$dir/source.pdf" > "$dir/bytes.txt"
          sha256sum "$dir/source.pdf" | cut -d' ' -f1 > "$dir/sha256.txt"

      - name: Verify structure and render front matter
        shell: bash
        run: |
          set -euo pipefail
          dir="index-resolver/$SOURCE_ID"
          original_status=0
          qpdf --check "$dir/source.pdf" > "$dir/qpdf-original.txt" 2>&1 || original_status=$?
          qpdf --object-streams=generate "$dir/source.pdf" "$dir/normalized.pdf"
          qpdf --check "$dir/normalized.pdf" > "$dir/qpdf-normalized.txt" 2>&1
          pdfinfo "$dir/normalized.pdf" > "$dir/pdfinfo.txt"
          pdftotext -layout "$dir/normalized.pdf" "$dir/full-text.txt"
          pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' "$dir/pdfinfo.txt")"
          end=12
          if [ "$pages" -lt "$end" ]; then end="$pages"; fi
          pdftoppm -f 1 -l "$end" -jpeg -r 130 "$dir/normalized.pdf" "$dir/front" >/dev/null 2>&1
          printf 'original_qpdf_exit=%s\npages=%s\ntext_bytes=%s\n' \
            "$original_status" "$pages" "$(wc -c < "$dir/full-text.txt")" > "$dir/summary.txt"

      - name: Upload resolver evidence
        uses: actions/upload-artifact@v4
        with:
          name: source-49-index-${{ matrix.source.id }}
          path: |
            index-resolver/${{ matrix.source.id }}/index-headers.txt
            index-resolver/${{ matrix.source.id }}/resolution.json
            index-resolver/${{ matrix.source.id }}/resolved-url.txt
            index-resolver/${{ matrix.source.id }}/bytes.txt
            index-resolver/${{ matrix.source.id }}/sha256.txt
            index-resolver/${{ matrix.source.id }}/qpdf-original.txt
            index-resolver/${{ matrix.source.id }}/qpdf-normalized.txt
            index-resolver/${{ matrix.source.id }}/pdfinfo.txt
            index-resolver/${{ matrix.source.id }}/full-text.txt
            index-resolver/${{ matrix.source.id }}/summary.txt
            index-resolver/${{ matrix.source.id }}/front-*.jpg
          retention-days: 14

      - name: Upload resolved raw PDF
        uses: actions/upload-artifact@v4
        with:
          name: source-49-index-${{ matrix.source.id }}-raw
          path: index-resolver/${{ matrix.source.id }}/source.pdf
          retention-days: 7
          compression-level: 0
