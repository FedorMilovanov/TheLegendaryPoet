name: Responsive browser audit

on:
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/visual-responsive-audit.yml'
      - 'scripts/responsive-audit.mjs'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-unmerged-essays

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Install Chromium audit runtime
        run: |
          npm install --no-save --package-lock=false playwright@1.55.0 >/tmp/playwright-install.log 2>&1
          npx playwright install --with-deps chromium >/tmp/chromium-install.log 2>&1

      - name: Validate and build production site
        run: |
          npm run check
          VITE_BASE=/ npm run build

      - name: Start production preview
        run: |
          nohup npx vite preview --host 127.0.0.1 --port 4173 > /tmp/tlp-preview.log 2>&1 &
          for i in {1..40}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/tlp-preview.log
          exit 1

      - name: Run viewport and interaction audit
        run: node scripts/responsive-audit.mjs

      - name: Upload screenshots and report
        uses: actions/upload-artifact@v4
        with:
          name: responsive-browser-audit
          path: responsive-audit
          retention-days: 7
          if-no-files-found: error
