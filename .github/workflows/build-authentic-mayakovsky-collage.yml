name: Build authentic Mayakovsky archive collage

on:
  pull_request:
    branches: [main]
    paths:
      - "scripts/build_authentic_mayakovsky_collage.py"
      - "scripts/run_authentic_collage_fast.py"
      - ".github/workflows/build-authentic-mayakovsky-collage.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-collage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install image tooling
        run: python -m pip install --disable-pip-version-check pillow requests

      - name: Download verified archival photographs and build collage
        id: build
        shell: bash
        run: |
          set +e
          mkdir -p build/archive-collage
          python scripts/run_authentic_collage_fast.py 2>&1 | tee build/archive-collage/build.log
          code=${PIPESTATUS[0]}
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Show verification summary
        if: always()
        shell: bash
        run: |
          ls -lah build/archive-collage || true
          tail -n 160 build/archive-collage/build.log || true

      - name: Upload authentic archive collage and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mayakovsky-brik-authentic-archive-collage
          path: build/archive-collage/
          if-no-files-found: error
          retention-days: 30

      - name: Fail if build failed
        if: steps.build.outputs.exit_code != '0'
        run: exit 1
