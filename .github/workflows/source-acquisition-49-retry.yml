name: Source acquisition 49 retry

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retry:
    name: retry ${{ matrix.source.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        source:
          - id: esenin-chronicle-v5-book1-2013-mirror
            url: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/Летопись жизни и творчества С.А.Есенина в 5 томах. Том 5. Книга 1. Январь 1925 - 23 декабря 1925 г.%282013%29.pdf
            referer: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
          - id: esenin-chronicle-v5-book2-2018
            url: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/Летопись жизни и творчества С.А.Есенина в 5 томах. Том 5. Книга 2. 24 декабря 1925 - середина 1926 г.%282018%29.pdf
            referer: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
          - id: mayakovsky-death-case-2005
            url: https://publ.lib.ru/ARCHIVES/M/MAYAKOVSKIY_Vladimir_Vladimirovich/В том, что умираю, не вините никого... Следственное дело В.В.Маяковского. Документы, воспоминания современников.%282005%29.pdf
            referer: https://publ.lib.ru/ARCHIVES/M/MAYAKOVSKIY_Vladimir_Vladimirovich/
          - id: esenin-death-documents-2003
            url: https://warlib.site/wp-content/uploads/2025/12/death-of-esenin-warlib.site_.pdf
            referer: https://warlib.site/esenin-death/

    env:
      SOURCE_ID: ${{ matrix.source.id }}
      SOURCE_URL: ${{ matrix.source.url }}
      SOURCE_REFERER: ${{ matrix.source.referer }}

    steps:
      - uses: actions/checkout@v4

      - name: Install PDF tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qpdf poppler-utils

      - name: Download exact source path
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "retry/$SOURCE_ID"
          encoded_url="$(python3 - <<'PY'
          import os, urllib.parse
          url = os.environ['SOURCE_URL']
          parts = urllib.parse.urlsplit(url)
          path = urllib.parse.quote(urllib.parse.unquote(parts.path), safe='/[]_-.,')
          print(urllib.parse.urlunsplit((parts.scheme, parts.netloc, path, parts.query, parts.fragment)))
          PY
          )"
          printf '%s\n' "$encoded_url" > "retry/$SOURCE_ID/resolved-url.txt"
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 --max-time 3600 \
            --user-agent 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148 Safari/537.36' \
            --header 'Accept: application/pdf,application/octet-stream;q=0.9,*/*;q=0.1' \
            --header 'Accept-Language: ru,en;q=0.8' \
            --referer "$SOURCE_REFERER" \
            --output "retry/$SOURCE_ID/source.pdf" \
            "$encoded_url"
          test "$(head -c 5 "retry/$SOURCE_ID/source.pdf")" = '%PDF-'
          stat --printf='%s\n' "retry/$SOURCE_ID/source.pdf" > "retry/$SOURCE_ID/bytes.txt"
          sha256sum "retry/$SOURCE_ID/source.pdf" | cut -d' ' -f1 > "retry/$SOURCE_ID/sha256.txt"

      - name: Verify, normalize and extract front matter
        shell: bash
        run: |
          set -euo pipefail
          dir="retry/$SOURCE_ID"
          original_status=0
          qpdf --check "$dir/source.pdf" > "$dir/qpdf-original.txt" 2>&1 || original_status=$?
          qpdf --object-streams=generate "$dir/source.pdf" "$dir/normalized.pdf"
          qpdf --check "$dir/normalized.pdf" > "$dir/qpdf-normalized.txt" 2>&1
          pdfinfo "$dir/normalized.pdf" > "$dir/pdfinfo.txt"
          pdftotext -layout "$dir/normalized.pdf" "$dir/full-text.txt"
          pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' "$dir/pdfinfo.txt")"
          end=12
          if [ "$pages" -lt "$end" ]; then end="$pages"; fi
          pdftoppm -f 1 -l "$end" -jpeg -r 130 "$dir/normalized.pdf" "$dir/front" >/dev/null 2>&1
          printf 'original_qpdf_exit=%s\npages=%s\ntext_bytes=%s\n' \
            "$original_status" "$pages" "$(wc -c < "$dir/full-text.txt")" > "$dir/summary.txt"

      - name: Upload retry verification
        uses: actions/upload-artifact@v4
        with:
          name: source-49-retry-${{ matrix.source.id }}
          path: |
            retry/${{ matrix.source.id }}/resolved-url.txt
            retry/${{ matrix.source.id }}/bytes.txt
            retry/${{ matrix.source.id }}/sha256.txt
            retry/${{ matrix.source.id }}/qpdf-original.txt
            retry/${{ matrix.source.id }}/qpdf-normalized.txt
            retry/${{ matrix.source.id }}/pdfinfo.txt
            retry/${{ matrix.source.id }}/full-text.txt
            retry/${{ matrix.source.id }}/summary.txt
            retry/${{ matrix.source.id }}/front-*.jpg
          retention-days: 14

      - name: Upload raw source
        uses: actions/upload-artifact@v4
        with:
          name: source-49-retry-${{ matrix.source.id }}-raw
          path: retry/${{ matrix.source.id }}/source.pdf
          retention-days: 7
          compression-level: 0
