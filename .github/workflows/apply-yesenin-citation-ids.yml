name: Apply Yesenin citation ids

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate:
    if: github.head_ref == 'audit/playwright-total-article-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - run: python scripts/add-yesenin-citation-block-ids.py

      - name: Commit stable ids
        run: |
          if git diff --quiet; then
            echo "Already applied"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/essays/yeseninKutezhi.ts
          git commit -m "refactor: add stable Yesenin citation block ids"
          git push origin HEAD:${{ github.head_ref }}
