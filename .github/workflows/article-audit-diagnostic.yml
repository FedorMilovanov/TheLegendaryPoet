name: Article audit diagnostic

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture complete check output
        shell: bash
        run: |
          set +e
          npm run check > article-audit-diagnostic.log 2>&1
          echo "CHECK_EXIT=$?" >> article-audit-diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: article-audit-diagnostic
          path: article-audit-diagnostic.log
          retention-days: 1
