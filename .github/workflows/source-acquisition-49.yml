name: Source acquisition 49

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

jobs:
  acquire-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install PDF verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y poppler-utils qpdf unzip

      - name: Download source scans and build manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p source-acquisition-49/raw source-acquisition-49/verification
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import pathlib
          import time
          import urllib.parse
          import urllib.request

          root = pathlib.Path('source-acquisition-49')
          raw = root / 'raw'
          verification = root / 'verification'

          sources = [
              {
                  'id': 'esenin-chronicle-v2-2005',
                  'filename': 'esenin-chronicle-v2-2005.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/Летопись. Том 2.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-chronicle-v3-book2-2008',
                  'filename': 'esenin-chronicle-v3-book2-2008.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/letopis3-2.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-chronicle-v4-2010',
                  'filename': 'esenin-chronicle-v4-2010.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/letopis-4.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-chronicle-v5-book1-2013',
                  'filename': 'esenin-chronicle-v5-book1-2013.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/letopis5-1.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-pss-v6-letters-2005',
                  'filename': 'esenin-pss-v6-letters-2005.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/Esenin PSS_7_t6_2005.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-pss-v7-book2-2000',
                  'filename': 'esenin-pss-v7-book2-2000.pdf',
                  'url': 'https://biblio.imli.ru/images/abook/russliteratura/Esenin_PSS_7_t7-2_2000.pdf',
                  'provenance': 'IMLI RAN electronic library',
              },
              {
                  'id': 'esenin-chronicle-v5-book2-2018',
                  'filename': 'esenin-chronicle-v5-book2-2018.pdf',
                  'url': 'https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_(poet)/Летопись жизни и творчества С.А.Есенина в 5 томах. Том 5. Книга 2. 24 декабря 1925 - середина 1926 г.(2018).pdf',
                  'provenance': 'Universal Library mirror; verify against IMLI title and colophon',
              },
              {
                  'id': 'mayakovsky-death-case-2005',
                  'filename': 'mayakovsky-death-case-2005.pdf',
                  'url': 'https://publ.lib.ru/ARCHIVES/M/MAYAKOVSKIY_Vladimir_Vladimirovich/В том, что умираю, не вините никого... Следственное дело В.В.Маяковского. Документы, воспоминания современников.(2005).pdf',
                  'provenance': 'Universal Library mirror; independently catalogued by NLR',
              },
          ]

          def encoded_url(url: str) -> str:
              parts = urllib.parse.urlsplit(url)
              return urllib.parse.urlunsplit((
                  parts.scheme,
                  parts.netloc,
                  urllib.parse.quote(urllib.parse.unquote(parts.path), safe='/()[]_-.,'),
                  parts.query,
                  parts.fragment,
              ))

          def download(url: str, target: pathlib.Path) -> None:
              last_error: Exception | None = None
              for attempt in range(1, 6):
                  try:
                      request = urllib.request.Request(
                          encoded_url(url),
                          headers={
                              'User-Agent': 'Mozilla/5.0 source-verification/1.0',
                              'Accept': 'application/pdf,application/octet-stream;q=0.9,*/*;q=0.1',
                          },
                      )
                      with urllib.request.urlopen(request, timeout=180) as response, target.open('wb') as output:
                          while True:
                              chunk = response.read(1024 * 1024)
                              if not chunk:
                                  break
                              output.write(chunk)
                      if target.stat().st_size < 1024:
                          raise RuntimeError(f'download too small: {target.stat().st_size} bytes')
                      return
                  except Exception as error:
                      last_error = error
                      target.unlink(missing_ok=True)
                      if attempt < 5:
                          time.sleep(attempt * 5)
              raise RuntimeError(f'failed to download {url}: {last_error}')

          manifest: list[dict[str, object]] = []
          for source in sources:
              target = raw / str(source['filename'])
              download(str(source['url']), target)
              header = target.read_bytes()[:5]
              if header != b'%PDF-':
                  raise RuntimeError(f"{source['id']} is not a PDF: header={header!r}")
              digest = hashlib.sha256(target.read_bytes()).hexdigest()
              manifest.append({
                  **source,
                  'resolved_url': encoded_url(str(source['url'])),
                  'bytes': target.stat().st_size,
                  'sha256': digest,
              })
              print(f"downloaded {source['id']}: {target.stat().st_size} bytes sha256={digest}")

          (verification / 'download-manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Verify PDF structure, pagination and searchable text
        shell: bash
        run: |
          set -euo pipefail
          raw='source-acquisition-49/raw'
          out='source-acquisition-49/verification'
          : > "$out/pdf-verification-summary.txt"
          for pdf in "$raw"/*.pdf; do
            base="$(basename "$pdf" .pdf)"
            mkdir -p "$out/$base"
            qpdf --check "$pdf" > "$out/$base/qpdf-check.txt" 2>&1
            pdfinfo "$pdf" > "$out/$base/pdfinfo.txt"
            pdftotext -layout "$pdf" "$out/$base/full-text.txt"
            pdftoppm -f 1 -singlefile -jpeg -r 110 "$pdf" "$out/$base/page-0001" >/dev/null 2>&1
            pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' "$out/$base/pdfinfo.txt")"
            chars="$(wc -c < "$out/$base/full-text.txt")"
            printf '%s\tpages=%s\ttext-bytes=%s\n' "$base" "$pages" "$chars" | tee -a "$out/pdf-verification-summary.txt"
          done

      - name: Build targeted evidence extracts
        shell: bash
        run: |
          set -euo pipefail
          out='source-acquisition-49/verification'
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import pathlib
          import re

          out = pathlib.Path('source-acquisition-49/verification')
          needles = {
              'esenin-chronicle-v5-book2-2018': [
                  'Англетер', 'Горбов', 'Гиляревский', 'акт осмотра', '28 декабря 1925',
                  'клиник', 'удостоверение № 1037', 'до свиданья, друг мой',
              ],
              'esenin-pss-v7-book2-2000': [
                  'Стойло Пегаса', 'брач', 'клиник', 'афиш', 'программа', 'деловые бумаги',
              ],
              'esenin-pss-v6-letters-2005': [
                  'Толстая', 'Бениславская', 'Эрлих', 'Клюев', 'Мариенгоф',
              ],
              'mayakovsky-death-case-2005': [
                  'Дело № 50', 'Полонская', 'предсмерт', 'выстрел', 'экспертиз',
                  '14 апреля 1930', 'Всем',
              ],
          }

          report: dict[str, dict[str, list[str]]] = {}
          for source_id, terms in needles.items():
              text_path = out / source_id / 'full-text.txt'
              text = text_path.read_text(encoding='utf-8', errors='replace')
              lines = text.splitlines()
              source_report: dict[str, list[str]] = {}
              for term in terms:
                  matches: list[str] = []
                  pattern = re.compile(re.escape(term), re.IGNORECASE)
                  for index, line in enumerate(lines):
                      if pattern.search(line):
                          start = max(0, index - 2)
                          end = min(len(lines), index + 3)
                          excerpt = '\n'.join(lines[start:end]).strip()
                          matches.append(excerpt)
                          if len(matches) == 8:
                              break
                  source_report[term] = matches
              report[source_id] = source_report

          (out / 'targeted-evidence-extracts.json').write_text(
              json.dumps(report, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

      - name: Upload verification bundle
        uses: actions/upload-artifact@v4
        with:
          name: source-49-verification
          path: source-acquisition-49/verification
          retention-days: 14
          compression-level: 6

      - name: Upload raw source PDFs
        uses: actions/upload-artifact@v4
        with:
          name: source-49-raw-pdfs
          path: source-acquisition-49/raw
          retention-days: 7
          compression-level: 0
