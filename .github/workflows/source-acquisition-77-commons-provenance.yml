name: Source acquisition 77 Commons original provenance

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-acquisition-77-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acquire-and-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install provenance dependencies
        run: python -m pip install --disable-pip-version-check requests==2.32.4 pillow==11.3.0

      - name: Enforce original-only acquisition source
        shell: bash
        run: |
          set -euo pipefail
          python -m py_compile \
            scripts/source-acquisition/commons-provenance-77.py \
            scripts/source-acquisition/commons-provenance-77-runner.py
          if grep -En 'images\.weserv|wsrv\.nl|thumburl|Special:Redirect/file' \
            scripts/source-acquisition/commons-provenance-77.py \
            scripts/source-acquisition/commons-provenance-77-runner.py; then
            echo 'Proxy, thumbnail or Special:Redirect acquisition is forbidden.' >&2
            exit 1
          fi
          grep -q 'parsed.hostname == "upload.wikimedia.org"' \
            scripts/source-acquisition/commons-provenance-77.py
          grep -q '"/thumb/" not in parsed.path' \
            scripts/source-acquisition/commons-provenance-77.py
          grep -q 'Commons API error' \
            scripts/source-acquisition/commons-provenance-77-runner.py

      - name: Acquire exact Commons originals and build provenance evidence
        shell: bash
        run: |
          set -o pipefail
          mkdir -p build/provenance-77
          code=0
          python scripts/source-acquisition/commons-provenance-77-runner.py \
            --output build/provenance-77 \
            2>&1 | tee build/provenance-77/process.log || code=${PIPESTATUS[0]}
          printf '%s\n' "$code" > build/provenance-77/process-exit.txt
          exit "$code"

      - name: Upload provenance ledger and diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-77-commons-provenance-evidence
          path: |
            build/provenance-77/commons-api-response.json
            build/provenance-77/manifest.json
            build/provenance-77/manifest.csv
            build/provenance-77/network-audit.jsonl
            build/provenance-77/duplicate-audit.json
            build/provenance-77/summary.json
            build/provenance-77/contact-sheet.jpg
            build/provenance-77/process.log
            build/provenance-77/process-exit.txt
          if-no-files-found: warn
          retention-days: 14

      - name: Upload exact Commons originals
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-77-commons-originals
          path: build/provenance-77/originals
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0

      - name: Upload generated review derivatives
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-77-review-derivatives
          path: build/provenance-77/derivatives
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
