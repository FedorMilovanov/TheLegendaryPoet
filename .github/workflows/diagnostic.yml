name: PR diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture checks and generated output
        shell: bash
        run: |
          set +e
          npm run check > diagnostic.log 2>&1
          echo "CHECK_EXIT=$?" >> diagnostic.log
          npm run sitemap >> diagnostic.log 2>&1
          npm run build >> diagnostic.log 2>&1
          npm run prerender >> diagnostic.log 2>&1
          echo >> diagnostic.log
          echo "GENERATED_FILES" >> diagnostic.log
          git diff --name-only >> diagnostic.log
          git diff -- public/sitemap.xml public/404.html >> generated.patch
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: check-diagnostic
          path: |
            diagnostic.log
            generated.patch
          retention-days: 1
