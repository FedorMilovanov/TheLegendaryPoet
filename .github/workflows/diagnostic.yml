name: PR diagnostics

on:
  push:
    branches:
      - work/mayakovsky-visual-essays

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture checks
        shell: bash
        run: |
          set +e
          npm run check > diagnostic.log 2>&1
          echo "CHECK_EXIT=$?" >> diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: check-diagnostic
          path: diagnostic.log
          retention-days: 1
