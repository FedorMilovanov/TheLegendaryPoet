name: Source acquisition 49 Mayakovsky sources

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-mayakovsky-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-mayakovsky-case:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install PDF verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qpdf poppler-utils

      - name: Download independent photographic OCR-PDF
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p mayakovsky-case/front mayakovsky-case/case-50
          curl --fail --location --retry 8 --retry-all-errors --connect-timeout 30 --max-time 2400 \
            --user-agent 'Mozilla/5.0 source-verification/1.0' \
            --referer 'https://imwerden.de/publ-11371' \
            --output mayakovsky-case/source.pdf \
            'https://imwerden.de/pdf/mayakovsky_sledstvennoe_delo_dokumenty_2005__ocr.pdf'
          test "$(head -c 5 mayakovsky-case/source.pdf)" = '%PDF-'
          stat --printf='%s\n' mayakovsky-case/source.pdf > mayakovsky-case/bytes.txt
          sha256sum mayakovsky-case/source.pdf | cut -d' ' -f1 > mayakovsky-case/sha256.txt

      - name: Verify structure, pagination and target sections
        shell: bash
        run: |
          set -euo pipefail
          qpdf --check mayakovsky-case/source.pdf > mayakovsky-case/qpdf-check.txt 2>&1
          pdfinfo mayakovsky-case/source.pdf > mayakovsky-case/pdfinfo.txt
          pdftotext -layout mayakovsky-case/source.pdf mayakovsky-case/full-text.txt
          pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' mayakovsky-case/pdfinfo.txt)"
          pdftoppm -f 1 -l 14 -jpeg -r 130 mayakovsky-case/source.pdf mayakovsky-case/front/page >/dev/null 2>&1
          pdftoppm -f 30 -l 100 -jpeg -r 110 mayakovsky-case/source.pdf mayakovsky-case/case-50/page >/dev/null 2>&1
          pdftoppm -f "$pages" -l "$pages" -singlefile -jpeg -r 130 mayakovsky-case/source.pdf mayakovsky-case/final-page >/dev/null 2>&1
          python3 - <<'PY'
          from __future__ import annotations

          import json
          import pathlib
          import re

          root = pathlib.Path('mayakovsky-case')
          text = (root / 'full-text.txt').read_text(encoding='utf-8', errors='replace')
          pages = text.split('\f')
          terms = [
              'Дело № 50', 'Дело N.50', 'Полонская', '14 апреля 1930',
              'В том, что умираю', 'предсмерт', 'выстрел', 'судебно-медицин',
              'баллист', 'экспертиз', 'Всем', 'Ежов', 'ОГПУ',
          ]
          evidence: dict[str, list[dict[str, object]]] = {}
          for term in terms:
              pattern = re.compile(re.escape(term), re.IGNORECASE)
              matches: list[dict[str, object]] = []
              for page_number, page in enumerate(pages, start=1):
                  match = pattern.search(page)
                  if not match:
                      continue
                  start = max(0, match.start() - 350)
                  end = min(len(page), match.end() + 600)
                  matches.append({
                      'pdf_page': page_number,
                      'excerpt': ' '.join(page[start:end].split()),
                  })
                  if len(matches) >= 20:
                      break
              evidence[term] = matches
          (root / 'targeted-evidence.json').write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY
          printf 'pages=%s\ntext_bytes=%s\n' "$pages" "$(wc -c < mayakovsky-case/full-text.txt)" > mayakovsky-case/summary.txt

      - name: Upload verification evidence
        uses: actions/upload-artifact@v4
        with:
          name: source-49-mayakovsky-case-2005-verification
          path: |
            mayakovsky-case/bytes.txt
            mayakovsky-case/sha256.txt
            mayakovsky-case/qpdf-check.txt
            mayakovsky-case/pdfinfo.txt
            mayakovsky-case/full-text.txt
            mayakovsky-case/targeted-evidence.json
            mayakovsky-case/summary.txt
            mayakovsky-case/front/*.jpg
            mayakovsky-case/case-50/*.jpg
            mayakovsky-case/final-page.jpg
          retention-days: 14

      - name: Upload raw PDF
        uses: actions/upload-artifact@v4
        with:
          name: source-49-mayakovsky-case-2005-raw
          path: mayakovsky-case/source.pdf
          retention-days: 7
          compression-level: 0

  verify-pro-eto-viewer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install image verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick

      - name: Download all unique high-resolution scans
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pro-eto/pages pro-eto/contact-sheets
          python3 - <<'PY'
          from __future__ import annotations

          import hashlib
          import json
          import pathlib
          import re
          import urllib.request

          root = pathlib.Path('pro-eto')
          page_url = 'https://www.togdazine.ru/article/1389'
          request = urllib.request.Request(page_url, headers={'User-Agent': 'Mozilla/5.0 source-verification/1.0'})
          with urllib.request.urlopen(request, timeout=120) as response:
              html = response.read().decode('utf-8', errors='replace')
          (root / 'viewer.html').write_text(html, encoding='utf-8')

          hashes: list[str] = []
          seen: set[str] = set()
          for match in re.finditer(r'/images/gallery/111/(?:555|1170)/([0-9a-f]{32}\.jpg)', html, re.I):
              filename = match.group(1).lower()
              if filename in seen:
                  continue
              seen.add(filename)
              hashes.append(filename)

          if len(hashes) != 48:
              raise RuntimeError(f'expected 48 unique scans, found {len(hashes)}')

          manifest: list[dict[str, object]] = []
          for index, filename in enumerate(hashes, start=1):
              url = f'https://www.togdazine.ru/images/gallery/111/1170/{filename}'
              target = root / 'pages' / f'{index:03d}-{filename}'
              request = urllib.request.Request(url, headers={
                  'User-Agent': 'Mozilla/5.0 source-verification/1.0',
                  'Referer': page_url,
              })
              with urllib.request.urlopen(request, timeout=180) as response, target.open('wb') as output:
                  data = response.read()
                  output.write(data)
              if not data.startswith(b'\xff\xd8\xff'):
                  raise RuntimeError(f'{target} is not a JPEG')
              manifest.append({
                  'sequence': index,
                  'filename': filename,
                  'url': url,
                  'bytes': len(data),
                  'sha256': hashlib.sha256(data).hexdigest(),
              })

          (root / 'manifest.json').write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + '\n', encoding='utf-8'
          )
          PY

      - name: Verify dimensions and build contact sheets
        shell: bash
        run: |
          set -euo pipefail
          : > pro-eto/dimensions.tsv
          for image in pro-eto/pages/*.jpg; do
            identify -format '%f\t%wx%h\n' "$image" >> pro-eto/dimensions.tsv
          done
          montage pro-eto/pages/0{01..24}-*.jpg -thumbnail 220x320 -tile 6x4 -geometry +8+8 pro-eto/contact-sheets/pages-001-024.jpg
          montage pro-eto/pages/0{25..48}-*.jpg -thumbnail 220x320 -tile 6x4 -geometry +8+8 pro-eto/contact-sheets/pages-025-048.jpg
          printf 'unique_scans=%s\ntotal_bytes=%s\n' \
            "$(find pro-eto/pages -type f -name '*.jpg' | wc -l)" \
            "$(find pro-eto/pages -type f -name '*.jpg' -printf '%s\n' | awk '{sum += $1} END {print sum}')" \
            > pro-eto/summary.txt

      - name: Upload viewer verification
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-1923-viewer-verification
          path: |
            pro-eto/manifest.json
            pro-eto/dimensions.tsv
            pro-eto/summary.txt
            pro-eto/contact-sheets/*.jpg
          retention-days: 14

      - name: Upload page scans
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-1923-page-scans
          path: pro-eto/pages/*.jpg
          retention-days: 7
          compression-level: 0
