name: Source acquisition 49 Pro eto SHPL high resolution

on:
  push:
    branches:
      - research/source-acquisition-49
    paths:
      - .github/workflows/source-acquisition-49-pro-eto-shpl-hires.yml
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
    paths:
      - .github/workflows/source-acquisition-49-pro-eto-shpl-hires.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-pro-eto-shpl-hires-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acquire-hires:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick python3-pil python3-requests

      - name: Download maximum official page images
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p pro-eto-shpl-hires/pages pro-eto-shpl-hires/contact-sheets

          cat > /tmp/acquire-hires.py <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import hashlib
          import io
          import json
          import pathlib
          import time
          from typing import Any

          import requests
          from PIL import Image
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          ROOT = pathlib.Path('pro-eto-shpl-hires')
          BASE = 'http://elib.shpl.ru'
          NODE_URL = BASE + '/ru/nodes/3515-mayakovskiy-v-v-pro-eto-m-pg-gos-izd-vo-1923'
          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36 source-verifier/5.0'

          session = requests.Session()
          retry = Retry(
              total=3,
              connect=3,
              read=3,
              backoff_factor=0.5,
              status_forcelist=(429, 500, 502, 503, 504),
              allowed_methods=frozenset({'GET'}),
          )
          session.mount('http://', HTTPAdapter(max_retries=retry, pool_connections=20, pool_maxsize=20))
          session.headers.update({'User-Agent': UA})

          def save_json(name: str, value: Any) -> None:
              (ROOT / name).write_text(
                  json.dumps(value, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )

          def extract_options(text: str) -> dict[str, Any]:
              marker = text.find('initDocview(')
              start = text.find('{', marker)
              if marker < 0 or start < 0:
                  raise RuntimeError('initDocview payload not found')
              depth = 0
              quoted = False
              escaped = False
              quote = ''
              for index in range(start, len(text)):
                  char = text[index]
                  if quoted:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == quote:
                          quoted = False
                      continue
                  if char in ('"', "'"):
                      quoted = True
                      quote = char
                  elif char == '{':
                      depth += 1
                  elif char == '}':
                      depth -= 1
                      if depth == 0:
                          return json.loads(text[start:index + 1])
              raise RuntimeError('unterminated initDocview payload')

          node = session.get(NODE_URL, timeout=(20, 180))
          node.raise_for_status()
          (ROOT / 'node.html').write_bytes(node.content)
          options = extract_options(node.text)
          pages = options.get('pages') or []
          if len(pages) != 70:
              raise RuntimeError(f'expected 70 pages, found {len(pages)}')
          save_json('docview-options.json', options)

          expected_widths = options.get('zoom_widths') or options.get('zooms') or []
          zoom_order = [8, 7, 6, 5, 4, 3]

          def acquire(item: tuple[int, dict[str, Any]]) -> dict[str, Any]:
              sequence, page = item
              page_id = int(page['id'])
              attempts: list[dict[str, Any]] = []
              for zoom in zoom_order:
                  url = f'{BASE}/pages/{page_id}/zooms/{zoom}'
                  started = time.monotonic()
                  try:
                      response = session.get(
                          url,
                          headers={'Referer': NODE_URL},
                          timeout=(10, 120),
                      )
                      body = response.content
                      attempt: dict[str, Any] = {
                          'zoom': zoom,
                          'url': url,
                          'status': response.status_code,
                          'bytes': len(body),
                          'content_type': response.headers.get('content-type', ''),
                          'elapsed': round(time.monotonic() - started, 3),
                      }
                      if response.status_code != 200 or len(body) < 1000:
                          attempts.append(attempt)
                          continue
                      try:
                          with Image.open(io.BytesIO(body)) as image:
                              width, height = image.size
                              image_format = (image.format or 'JPEG').lower()
                      except Exception as error:
                          attempt['image_error'] = repr(error)
                          attempts.append(attempt)
                          continue
                      attempt.update({'width': width, 'height': height})
                      attempts.append(attempt)
                      extension = 'jpg' if image_format in ('jpeg', 'jpg') else image_format
                      target = ROOT / 'pages' / f'{sequence:03d}-page-{page_id}-z{zoom}.{extension}'
                      target.write_bytes(body)
                      return {
                          'sequence': sequence,
                          'page_id': page_id,
                          'source_width': page['w'],
                          'source_height': page['h'],
                          'selected_zoom': zoom,
                          'expected_zoom_width': expected_widths[zoom] if zoom < len(expected_widths) else None,
                          'width': width,
                          'height': height,
                          'bytes': len(body),
                          'sha256': hashlib.sha256(body).hexdigest(),
                          'url': url,
                          'file': str(target),
                          'attempts': attempts,
                      }
                  except Exception as error:
                      attempts.append({
                          'zoom': zoom,
                          'url': url,
                          'error': repr(error),
                          'elapsed': round(time.monotonic() - started, 3),
                      })
              return {
                  'sequence': sequence,
                  'page_id': page_id,
                  'status': 'missing',
                  'attempts': attempts,
              }

          with concurrent.futures.ThreadPoolExecutor(max_workers=14) as executor:
              manifest = list(executor.map(acquire, enumerate(pages, start=1)))
          manifest.sort(key=lambda item: item['sequence'])
          save_json('hires-manifest.json', manifest)

          downloaded = [item for item in manifest if item.get('file')]
          zoom_counts: dict[str, int] = {}
          for item in downloaded:
              key = str(item['selected_zoom'])
              zoom_counts[key] = zoom_counts.get(key, 0) + 1
          summary = {
              'physical_scans': len(pages),
              'downloaded': len(downloaded),
              'missing': len(pages) - len(downloaded),
              'zoom_counts': zoom_counts,
              'min_dimensions': [
                  min((item['width'] for item in downloaded), default=0),
                  min((item['height'] for item in downloaded), default=0),
              ],
              'max_dimensions': [
                  max((item['width'] for item in downloaded), default=0),
                  max((item['height'] for item in downloaded), default=0),
              ],
              'total_bytes': sum(item['bytes'] for item in downloaded),
          }
          save_json('hires-summary.json', summary)
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          if len(downloaded) != 70:
              raise RuntimeError(f"only {len(downloaded)} of 70 high-resolution pages acquired")
          PY

          python3 /tmp/acquire-hires.py

      - name: Build high-resolution contact sheets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          count="$(find pro-eto-shpl-hires/pages -type f | wc -l)"
          printf 'page_files=%s\n' "$count" > pro-eto-shpl-hires/page-count.txt
          if [ "$count" -gt 0 ]; then
            montage pro-eto-shpl-hires/pages/* -thumbnail 260x -tile 10x -geometry +6+6 pro-eto-shpl-hires/contact-sheets/all-pages.jpg
            for start in 1 21 41 61; do
              end=$((start + 19))
              mapfile -t files < <(find pro-eto-shpl-hires/pages -type f -printf '%f\n' | sort | awk -v s="$start" -v e="$end" 'NR>=s && NR<=e {print "pro-eto-shpl-hires/pages/"$0}')
              if [ "${#files[@]}" -gt 0 ]; then
                printf -v label '%03d-%03d' "$start" "$end"
                montage "${files[@]}" -thumbnail 440x -tile 5x -geometry +8+8 "pro-eto-shpl-hires/contact-sheets/pages-$label.jpg"
              fi
            done
          fi

      - name: Upload high-resolution verification
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-shpl-hires-verification
          path: |
            pro-eto-shpl-hires/docview-options.json
            pro-eto-shpl-hires/hires-manifest.json
            pro-eto-shpl-hires/hires-summary.json
            pro-eto-shpl-hires/page-count.txt
            pro-eto-shpl-hires/contact-sheets/*.jpg
          if-no-files-found: warn
          retention-days: 14

      - name: Upload high-resolution official scans
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-shpl-hires-page-scans
          path: pro-eto-shpl-hires/pages
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
