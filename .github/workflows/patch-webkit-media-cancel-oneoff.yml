name: Patch WebKit media cancel one-off

on:
  push:
    branches:
      - agent/mobile-safari-android-qa-20260724
    paths:
      - .github/workflows/patch-webkit-media-cancel-oneoff.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-safari-android-qa-20260724
          fetch-depth: 0

      - name: Scope expected WebKit media cancellation by URL
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('qa/mobile-platforms.spec.mjs')
          text = path.read_text(encoding='utf-8')
          old = "    if (request.resourceType() === 'media' && /cancelled/i.test(failure)) return;"
          new = "    if (/cancelled/i.test(failure) && /\\/audio\\/.*\\.(?:mp3|m4a|ogg|wav)(?:$|[?#])/i.test(url)) return;"
          if text.count(old) != 1:
              raise SystemExit(f'Expected one old media-cancel guard, found {text.count(old)}')
          path.write_text(text.replace(old, new), encoding='utf-8')
          PY

      - name: Validate and remove one-off workflow
        run: |
          node --check qa/mobile-platforms.spec.mjs
          git rm .github/workflows/patch-webkit-media-cancel-oneoff.yml
          git diff --check

      - name: Commit QA patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add qa/mobile-platforms.spec.mjs
          git commit -m "Scope WebKit audio cancellation by request URL"
          git push origin HEAD:agent/mobile-safari-android-qa-20260724
