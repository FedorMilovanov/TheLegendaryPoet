name: Remove irrelevant martyrdom qualification

on:
  push:
    branches: [agent/integrate-unmerged-essays]
    paths:
      - '.github/workflows/remove-irrelevant-martyrdom-qualification.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-unmerged-essays
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Apply relevance correction
        run: npx tsx scripts/remove-irrelevant-martyrdom-qualification.ts
      - name: Validate content, literary style, and types
        run: npm run check
      - name: Generate sitemap
        run: npm run sitemap
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
      - name: Prerender social pages
        run: npm run prerender
      - name: Verify generated output is stable
        run: git diff --exit-code -- public/sitemap.xml
      - name: Commit relevance correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add POET_AUTHORING_GUIDE.md docs/PRIMARY_SOURCE_REAUDIT_2026-07-21.md scripts/validate-literary-style.ts src/data/library/nikolayGumilev.ts
          git commit -m "Remove irrelevant martyrdom polemic" || exit 0
          git push
