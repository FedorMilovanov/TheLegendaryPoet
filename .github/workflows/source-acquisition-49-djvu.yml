name: Source acquisition 49 DJVU mirrors

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-djvu-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acquire-djvu:
    name: djvu ${{ matrix.source.id }}
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        source:
          - id: esenin-chronicle-v2-2005
            index: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
            needle: РўРѕРј 2. 1917-1920
            year: "2005"
          - id: esenin-chronicle-v5-book1-2013
            index: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
            needle: РўРѕРј 5. РљРЅРёРіР° 1. РЇРЅРІР°СЂСЊ 1925
            year: "2013"
          - id: esenin-chronicle-v5-book2-2018
            index: https://publ.lib.ru/ARCHIVES/E/ESENIN_Sergey_Aleksandrovich_%28poet%29/
            needle: РўРѕРј 5. РљРЅРёРіР° 2. 24 РґРµРєР°Р±СЂСЏ 1925
            year: "2018"

    env:
      SOURCE_ID: ${{ matrix.source.id }}
      INDEX_URL: ${{ matrix.source.index }}
      NEEDLE: ${{ matrix.source.needle }}
      TARGET_YEAR: ${{ matrix.source.year }}

    steps:
      - uses: actions/checkout@v4

      - name: Install DJVU and download tools
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 curl djvulibre-bin imagemagick

      - name: Resolve exact DJVU href
        shell: bash
        run: |
          set -euo pipefail
          dir="djvu/$SOURCE_ID"
          mkdir -p "$dir/front"
          curl --fail --location --retry 5 --retry-all-errors --connect-timeout 30 --max-time 300 \
            --user-agent 'Mozilla/5.0 source-djvu-resolver/1.0' \
            --output "$dir/index.raw" \
            "$INDEX_URL"

          python3 - <<'PY'
          from __future__ import annotations

          import html.parser
          import json
          import os
          import pathlib
          import urllib.parse

          source_id = os.environ['SOURCE_ID']
          index_url = os.environ['INDEX_URL']
          needle = os.environ['NEEDLE']
          year = os.environ['TARGET_YEAR']
          root = pathlib.Path('djvu') / source_id
          raw = (root / 'index.raw').read_bytes()
          text = raw.decode('cp1251')

          class Anchors(html.parser.HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.href: str | None = None
                  self.label: list[str] = []
                  self.items: list[tuple[str, str]] = []
              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  if tag.lower() == 'a':
                      self.href = next((v for k, v in attrs if k.lower() == 'href' and v), None)
                      self.label = []
              def handle_data(self, data: str) -> None:
                  if self.href is not None:
                      self.label.append(data)
              def handle_endtag(self, tag: str) -> None:
                  if tag.lower() == 'a' and self.href is not None:
                      self.items.append((self.href, ''.join(self.label).strip()))
                      self.href = None
                      self.label = []

          parser = Anchors()
          parser.feed(text)
          matches: list[dict[str, str]] = []
          for href, label in parser.items:
              decoded = urllib.parse.unquote(href, encoding='cp1251', errors='replace')
              haystack = f'{label}\n{decoded}'
              if not decoded.casefold().endswith('.djvu'):
                  continue
              if needle.casefold() not in haystack.casefold() or year not in haystack:
                  continue
              absolute = urllib.parse.urljoin(index_url, href)
              matches.append({'href': href, 'label': label, 'decoded': decoded, 'resolved_url': absolute})

          report = {'id': source_id, 'index': index_url, 'matches': matches}
          (root / 'resolution.json').write_text(json.dumps(report, ensure_ascii=False, indent=2) + '\n', encoding='utf-8')
          if len(matches) != 1:
              raise RuntimeError(f'expected one DJVU, found {len(matches)}')
          (root / 'resolved-url.txt').write_text(matches[0]['resolved_url'] + '\n', encoding='utf-8')
          print(json.dumps(report, ensure_ascii=False, indent=2))
          PY

      - name: Download complete DJVU scan
        shell: bash
        run: |
          set -euo pipefail
          dir="djvu/$SOURCE_ID"
          url="$(cat "$dir/resolved-url.txt")"
          aria2c \
            --allow-overwrite=true \
            --auto-file-renaming=false \
            --continue=true \
            --connect-timeout=30 \
            --file-allocation=none \
            --max-connection-per-server=8 \
            --min-split-size=1M \
            --retry-wait=5 \
            --split=8 \
            --timeout=120 \
            --user-agent='Mozilla/5.0 source-djvu-resolver/1.0' \
            --referer="$INDEX_URL" \
            --dir="$dir" \
            --out=source.djvu \
            "$url"
          test -s "$dir/source.djvu"
          stat --printf='%s\n' "$dir/source.djvu" > "$dir/bytes.txt"
          sha256sum "$dir/source.djvu" | cut -d' ' -f1 > "$dir/sha256.txt"

      - name: Verify page topology and render witnesses
        shell: bash
        run: |
          set -euo pipefail
          dir="djvu/$SOURCE_ID"
          djvudump "$dir/source.djvu" > "$dir/djvudump.txt"
          djvused "$dir/source.djvu" -e n > "$dir/page-count.txt"
          pages="$(tr -d '[:space:]' < "$dir/page-count.txt")"
          test "$pages" -gt 1
          djvutxt "$dir/source.djvu" "$dir/full-text.txt" || true
          end=12
          if [ "$pages" -lt "$end" ]; then end="$pages"; fi
          for page in $(seq 1 "$end"); do
            printf -v page4 '%04d' "$page"
            ddjvu -format=jpeg -quality=90 -page="$page" -scale=1400 "$dir/source.djvu" "$dir/front/page-$page4.jpg"
          done
          ddjvu -format=jpeg -quality=90 -page="$pages" -scale=1400 "$dir/source.djvu" "$dir/final-page.jpg"
          printf 'pages=%s\ntext_bytes=%s\n' "$pages" "$(wc -c < "$dir/full-text.txt" 2>/dev/null || echo 0)" > "$dir/summary.txt"

      - name: Upload DJVU verification
        uses: actions/upload-artifact@v4
        with:
          name: source-49-djvu-${{ matrix.source.id }}-verification
          path: |
            djvu/${{ matrix.source.id }}/resolution.json
            djvu/${{ matrix.source.id }}/resolved-url.txt
            djvu/${{ matrix.source.id }}/bytes.txt
            djvu/${{ matrix.source.id }}/sha256.txt
            djvu/${{ matrix.source.id }}/djvudump.txt
            djvu/${{ matrix.source.id }}/page-count.txt
            djvu/${{ matrix.source.id }}/full-text.txt
            djvu/${{ matrix.source.id }}/summary.txt
            djvu/${{ matrix.source.id }}/front/*.jpg
            djvu/${{ matrix.source.id }}/final-page.jpg
          retention-days: 14

      - name: Upload raw DJVU scan
        uses: actions/upload-artifact@v4
        with:
          name: source-49-djvu-${{ matrix.source.id }}-raw
          path: djvu/${{ matrix.source.id }}/source.djvu
          retention-days: 7
          compression-level: 0
