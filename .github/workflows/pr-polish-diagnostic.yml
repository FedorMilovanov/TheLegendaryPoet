name: PR polish diagnostic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci --silent
      - name: Capture complete validation and build output
        shell: bash
        run: |
          set +e
          npm run check > diagnostic.log 2>&1
          echo "CHECK_EXIT=$?" >> diagnostic.log
          npm run sitemap >> diagnostic.log 2>&1
          echo "SITEMAP_EXIT=$?" >> diagnostic.log
          npm run build >> diagnostic.log 2>&1
          echo "BUILD_EXIT=$?" >> diagnostic.log
          npm run prerender >> diagnostic.log 2>&1
          echo "PRERENDER_EXIT=$?" >> diagnostic.log
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: polish-diagnostic
          path: diagnostic.log
          retention-days: 1
