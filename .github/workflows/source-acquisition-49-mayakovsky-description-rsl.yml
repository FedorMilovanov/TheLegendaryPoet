name: Source acquisition 49 Mayakovsky documentary description RSL

on:
  push:
    branches:
      - research/source-acquisition-49
    paths:
      - .github/workflows/source-acquisition-49-mayakovsky-description-rsl.yml
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
    paths:
      - .github/workflows/source-acquisition-49-mayakovsky-description-rsl.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-mayakovsky-description-rsl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-bs4 python3-requests

      - name: Resolve issue records and public-access boundaries
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p rsl-mayakovsky-description/searches rsl-mayakovsky-description/records

          cat > /tmp/resolve-rsl-descriptions.py <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import hashlib
          import json
          import pathlib
          import re
          import time
          from typing import Any
          from urllib.parse import urljoin

          import requests
          from bs4 import BeautifulSoup
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          ROOT = pathlib.Path('rsl-mayakovsky-description')
          BASE = 'https://search.rsl.ru'
          MASTER_ID = '01006741660'
          MASTER = f'{BASE}/ru/record/{MASTER_ID}'
          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36 source-verifier/2.0'
          TITLE = 'Описание документальных материалов В. В. Маяковского, находящихся в государственных хранилищах'
          QUERIES = [
              TITLE,
              f'{TITLE} Вып. 1',
              f'{TITLE} Вып. 2',
              f'{TITLE} Вып. 3',
              'В. В. Маяковский Описание документальных материалов выпуск 1',
              'В. В. Маяковский Описание документальных материалов выпуск 2',
              'В. В. Маяковский Описание документальных материалов выпуск 3',
          ]

          session = requests.Session()
          session.headers.update({
              'User-Agent': UA,
              'Accept-Language': 'ru-RU,ru;q=0.9,en;q=0.5',
          })
          retry = Retry(
              total=3,
              connect=3,
              read=3,
              backoff_factor=0.7,
              status_forcelist=(429, 500, 502, 503, 504),
              allowed_methods=frozenset({'GET', 'POST'}),
          )
          session.mount('https://', HTTPAdapter(max_retries=retry, pool_connections=12, pool_maxsize=12))

          def save_json(name: str, value: Any) -> None:
              (ROOT / name).write_text(
                  json.dumps(value, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )

          def record_urls(text: str, current_url: str) -> set[str]:
              soup = BeautifulSoup(text, 'html.parser')
              urls: set[str] = set()
              for anchor in soup.find_all('a', href=True):
                  href = urljoin(current_url, anchor.get('href', ''))
                  if re.search(r'/ru/record/\d+', href):
                      urls.add(href.split('#', 1)[0].split('?', 1)[0])
              for match in re.finditer(r'(?:https://search\.rsl\.ru)?/ru/record/\d+', text):
                  urls.add(urljoin(current_url, match.group(0)))
              return urls

          master = session.get(MASTER, timeout=(20, 180), allow_redirects=True)
          master.raise_for_status()
          (ROOT / 'master.html').write_bytes(master.content)
          save_json('master-headers.json', dict(master.headers))

          discovered = record_urls(master.text, master.url)
          discovered.add(MASTER)
          search_results: list[dict[str, Any]] = []

          for index, query in enumerate(QUERIES, start=1):
              for method in ('post', 'get'):
                  started = time.monotonic()
                  try:
                      if method == 'post':
                          response = session.post(
                              f'{BASE}/ru/search',
                              data={'search': query},
                              timeout=(20, 180),
                              allow_redirects=True,
                          )
                      else:
                          response = session.get(
                              f'{BASE}/ru/search',
                              params={'search': query},
                              timeout=(20, 180),
                              allow_redirects=True,
                          )
                      filename = f'searches/{index:02d}-{method}.html'
                      (ROOT / filename).write_bytes(response.content)
                      urls = record_urls(response.text, response.url)
                      discovered.update(urls)
                      search_results.append({
                          'query': query,
                          'method': method,
                          'requested_url': response.request.url,
                          'final_url': response.url,
                          'status': response.status_code,
                          'bytes': len(response.content),
                          'elapsed': round(time.monotonic() - started, 3),
                          'record_urls': sorted(urls),
                          'filename': filename,
                      })
                  except Exception as error:
                      search_results.append({
                          'query': query,
                          'method': method,
                          'error': repr(error),
                          'elapsed': round(time.monotonic() - started, 3),
                      })
          save_json('search-results.json', search_results)
          save_json('discovered-record-urls.json', sorted(discovered))

          access_terms = (
              'полный текст', 'электронный ресурс', 'читать', 'просмотр',
              'viewer', 'fulltext', 'digital', 'online', '.pdf', 'скачать',
          )

          def fetch_record(url: str) -> dict[str, Any]:
              started = time.monotonic()
              try:
                  response = session.get(url, timeout=(15, 120), allow_redirects=True)
                  response.raise_for_status()
                  digest = hashlib.sha256(url.encode()).hexdigest()[:16]
                  html_name = f'records/{digest}.html'
                  (ROOT / html_name).write_bytes(response.content)
                  soup = BeautifulSoup(response.text, 'html.parser')
                  title = soup.title.get_text(' ', strip=True) if soup.title else ''
                  record_title = ''
                  title_node = soup.select_one('.rsl-record-title')
                  if title_node:
                      record_title = ' '.join(title_node.get_text(' ', strip=True).split())
                  marc = ''
                  marc_node = soup.select_one('#marc-rec')
                  if marc_node:
                      marc = ' '.join(marc_node.get_text(' ', strip=True).split())
                  public_links: list[dict[str, str]] = []
                  fragment_links: list[dict[str, str]] = []
                  for anchor in soup.find_all('a', href=True):
                      href = urljoin(response.url, anchor.get('href', ''))
                      text = ' '.join(anchor.get_text(' ', strip=True).split())
                      lowered = f'{text} {href}'.casefold()
                      item = {'href': href, 'text': text}
                      if 'fragment-eorder' in href or 'заказать копию фрагмента' in lowered:
                          fragment_links.append(item)
                      if any(term in lowered for term in access_terms):
                          if 'download/marc21' not in href and 'fragment-eorder' not in href:
                              public_links.append(item)
                  classification = 'CATALOGUE-ONLY'
                  if public_links:
                      classification = 'PUBLIC-DIGITAL-CANDIDATE'
                  elif fragment_links:
                      classification = 'CATALOGUE-WITH-FRAGMENT-ORDER'
                  return {
                      'requested_url': url,
                      'final_url': response.url,
                      'status': response.status_code,
                      'bytes': len(response.content),
                      'elapsed': round(time.monotonic() - started, 3),
                      'title': title,
                      'record_title': record_title,
                      'marc_text': marc,
                      'public_links': public_links,
                      'fragment_links': fragment_links,
                      'classification': classification,
                      'filename': html_name,
                  }
              except Exception as error:
                  return {
                      'requested_url': url,
                      'error': repr(error),
                      'elapsed': round(time.monotonic() - started, 3),
                  }

          with concurrent.futures.ThreadPoolExecutor(max_workers=8) as executor:
              records = list(executor.map(fetch_record, sorted(discovered)))
          save_json('record-results.json', records)

          relevant = []
          for item in records:
              haystack = f"{item.get('record_title', '')} {item.get('marc_text', '')}".casefold()
              if 'маяковск' in haystack and 'описание документальных материалов' in haystack:
                  relevant.append(item)
          save_json('relevant-records.json', relevant)

          summary = {
              'master_id': MASTER_ID,
              'queries': len(QUERIES),
              'search_requests': len(search_results),
              'discovered_records': len(discovered),
              'fetched_records': sum(1 for item in records if item.get('status') == 200),
              'relevant_records': len(relevant),
              'public_digital_candidates': sum(
                  1 for item in relevant if item.get('classification') == 'PUBLIC-DIGITAL-CANDIDATE'
              ),
              'fragment_order_only': sum(
                  1 for item in relevant if item.get('classification') == 'CATALOGUE-WITH-FRAGMENT-ORDER'
              ),
              'relevant': [
                  {
                      'url': item.get('final_url') or item.get('requested_url'),
                      'title': item.get('record_title') or item.get('title'),
                      'classification': item.get('classification'),
                      'public_links': item.get('public_links'),
                      'fragment_links': item.get('fragment_links'),
                  }
                  for item in relevant
              ],
          }
          save_json('summary.json', summary)
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          PY

          python3 /tmp/resolve-rsl-descriptions.py

      - name: Upload RSL discovery evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-mayakovsky-description-rsl-discovery
          path: rsl-mayakovsky-description
          if-no-files-found: error
          retention-days: 14
