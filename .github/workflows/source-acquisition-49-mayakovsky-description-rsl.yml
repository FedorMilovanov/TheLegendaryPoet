name: Source acquisition 49 Mayakovsky documentary description RSL

on:
  push:
    branches:
      - research/source-acquisition-49
    paths:
      - .github/workflows/source-acquisition-49-mayakovsky-description-rsl.yml
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
    paths:
      - .github/workflows/source-acquisition-49-mayakovsky-description-rsl.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-mayakovsky-description-rsl-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acquire-issue-3:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Install verification and browser tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qpdf poppler-utils imagemagick
          npm install --no-save --ignore-scripts playwright@1.55.0
          npx playwright install --with-deps chromium

      - name: Probe record, direct PDF and viewer routes
        shell: bash
        run: |
          set -euo pipefail
          root='rsl-description-issue-3'
          mkdir -p "$root/direct" "$root/browser/responses" "$root/browser/downloads" "$root/front" "$root/final"
          record='https://search.rsl.ru/ru/record/01006741660'
          viewer='https://viewer.rsl.ru/ru/rsl01006741660?page=1&rotate=0&theme=white'
          dlib_path='/rsl01006000000/rsl01006741000/rsl01006741660/rsl01006741660.pdf'
          ua='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36 source-verifier/3.0'

          curl --location --compressed --retry 5 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            --user-agent "$ua" \
            --dump-header "$root/record-headers.txt" \
            --output "$root/record.html" \
            "$record"

          curl --location --compressed --retry 4 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            --user-agent "$ua" \
            --referer "$record" \
            --dump-header "$root/action-record-headers.txt" \
            --output "$root/action-record.js" \
            'https://search.rsl.ru/js/action-record.js' || true

          : > "$root/direct-attempts.tsv"
          found=''
          index=0
          for url in \
            "https://dlib.rsl.ru$dlib_path" \
            "http://dlib.rsl.ru$dlib_path" \
            'https://viewer.rsl.ru/ru/rsl01006741660' \
            'https://viewer.rsl.ru/rsl01006741660'; do
            index=$((index + 1))
            printf -v index2 '%02d' "$index"
            target="$root/direct/$index2.bin"
            headers="$root/direct/$index2.headers"
            code=0
            curl --location --compressed --retry 3 --retry-all-errors \
              --connect-timeout 30 --max-time 1800 \
              --user-agent "$ua" \
              --referer "$record" \
              --dump-header "$headers" \
              --output "$target" \
              "$url" || code=$?
            bytes=0
            signature=''
            [ -f "$target" ] && bytes="$(stat --printf='%s' "$target")"
            [ -f "$target" ] && signature="$(head -c 8 "$target" | xxd -p -c 32)"
            printf '%s\t%s\t%s\t%s\t%s\n' "$index2" "$code" "$bytes" "$signature" "$url" >> "$root/direct-attempts.tsv"
            if [ "$code" -eq 0 ] && [ -s "$target" ] && [ "$(head -c 5 "$target")" = '%PDF-' ]; then
              cp "$target" "$root/source.pdf"
              printf '%s\n' "$url" > "$root/acquired-url.txt"
              found='direct'
              break
            fi
          done
          printf '%s\n' "$found" > "$root/direct-result.txt"

          cat > /tmp/inspect-rsl-viewer.mjs <<'JS'
          import { chromium } from 'playwright';
          import crypto from 'node:crypto';
          import fs from 'node:fs/promises';
          import path from 'node:path';

          const root = path.resolve('rsl-description-issue-3/browser');
          const target = 'https://viewer.rsl.ru/ru/rsl01006741660?page=1&rotate=0&theme=white';
          const record = 'https://search.rsl.ru/ru/record/01006741660';
          const network = [];
          const events = [];
          const savedBodies = [];
          const candidates = new Set();
          const safe = value => crypto.createHash('sha256').update(String(value)).digest('hex').slice(0, 20);
          const addCandidate = value => {
            if (!value || typeof value !== 'string') return;
            if (/\.pdf(?:[?#]|$)|dlib\.rsl\.ru|viewer.*download|api.*document|file/i.test(value)) candidates.add(value);
          };

          let browser;
          let context;
          let page;
          let fatal = null;
          let initialStatus = null;
          try {
            browser = await chromium.launch({ headless: true });
            context = await browser.newContext({
              acceptDownloads: true,
              ignoreHTTPSErrors: true,
              viewport: { width: 1500, height: 1100 },
              locale: 'ru-RU',
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36 source-verifier/3.0',
            });
            page = await context.newPage();
            page.on('console', message => events.push({ type: 'console', level: message.type(), text: message.text() }));
            page.on('pageerror', error => events.push({ type: 'pageerror', text: error.stack || error.message }));
            page.on('requestfailed', request => events.push({ type: 'requestfailed', url: request.url(), failure: request.failure()?.errorText || '' }));
            page.on('request', request => {
              const item = { phase: 'request', method: request.method(), resourceType: request.resourceType(), url: request.url() };
              network.push(item);
              addCandidate(item.url);
            });
            page.on('response', async response => {
              const headers = await response.allHeaders().catch(() => ({}));
              const item = {
                phase: 'response',
                status: response.status(),
                contentType: headers['content-type'] || '',
                contentLength: headers['content-length'] || '',
                url: response.url(),
              };
              network.push(item);
              addCandidate(item.url);
              if (/application\/pdf/i.test(item.contentType)) addCandidate(item.url);
              if (/json|javascript|text\//i.test(item.contentType) && /api|viewer|document|book|page|file|download/i.test(item.url)) {
                try {
                  const body = await response.body();
                  if (body.length <= 12_000_000) {
                    const extension = item.contentType.includes('json') ? 'json' : item.contentType.includes('javascript') ? 'js' : 'txt';
                    const filename = `${safe(item.url)}.${extension}`;
                    await fs.writeFile(path.join(root, 'responses', filename), body);
                    savedBodies.push({ filename, bytes: body.length, url: item.url, contentType: item.contentType });
                    const text = body.toString('utf8');
                    for (const match of text.matchAll(/https?:\/\/[^\s"'<>]+/g)) addCandidate(match[0].replace(/[},;]+$/, ''));
                  }
                } catch {}
              }
            });
            page.on('download', async download => {
              const name = download.suggestedFilename().replace(/[^a-zA-Z0-9._-]+/g, '_');
              const destination = path.join(root, 'downloads', `${Date.now()}-${name}`);
              await download.saveAs(destination).catch(error => events.push({ type: 'download-error', text: String(error) }));
            });

            let navigation = await page.goto(target, { waitUntil: 'domcontentloaded', timeout: 120_000 }).catch(async error => {
              events.push({ type: 'viewer-navigation-error', text: error.stack || String(error) });
              return page.goto(record, { waitUntil: 'domcontentloaded', timeout: 120_000 });
            });
            initialStatus = navigation?.status() || null;
            await page.waitForTimeout(15_000);

            const downloadLocators = [
              page.getByText('Скачать', { exact: true }),
              page.getByRole('button', { name: /скач/i }),
              page.getByRole('link', { name: /скач/i }),
            ];
            for (const locator of downloadLocators) {
              if (await locator.count().catch(() => 0)) {
                await locator.first().click({ timeout: 10_000 }).catch(error => events.push({ type: 'download-click-error', text: String(error) }));
                await page.waitForTimeout(5_000);
                break;
              }
            }

            const dom = await page.evaluate(() => ({
              title: document.title,
              url: location.href,
              bodyText: (document.body?.innerText || '').slice(0, 200_000),
              html: document.documentElement?.outerHTML || '',
              links: [...document.querySelectorAll('a')].map(anchor => ({ href: anchor.href, text: (anchor.innerText || '').trim(), download: anchor.download })),
              buttons: [...document.querySelectorAll('button,[role=button]')].map(button => ({ text: (button.innerText || '').trim(), ariaLabel: button.getAttribute('aria-label'), title: button.getAttribute('title') })),
              resources: performance.getEntriesByType('resource').map(entry => ({ name: entry.name, initiatorType: entry.initiatorType, transferSize: entry.transferSize })),
            }));
            for (const link of dom.links) addCandidate(link.href);
            for (const resource of dom.resources) addCandidate(resource.name);
            await fs.writeFile(path.join(root, 'dom.json'), JSON.stringify({ ...dom, html: undefined }, null, 2));
            await fs.writeFile(path.join(root, 'page.html'), dom.html);
            await page.screenshot({ path: path.join(root, 'viewer.png'), fullPage: true }).catch(() => {});

            const candidateResults = [];
            let pdfSaved = false;
            for (const url of [...candidates].sort()) {
              try {
                const response = await context.request.get(url, { timeout: 120_000, failOnStatusCode: false, headers: { Referer: target } });
                const contentType = response.headers()['content-type'] || '';
                const body = await response.body();
                const isPdf = body.subarray(0, 5).toString() === '%PDF-';
                candidateResults.push({ url, status: response.status(), contentType, bytes: body.length, isPdf });
                if (!pdfSaved && response.status() === 200 && isPdf) {
                  await fs.writeFile(path.join(root, 'downloads', 'network-source.pdf'), body);
                  pdfSaved = true;
                }
              } catch (error) {
                candidateResults.push({ url, error: String(error) });
              }
            }
            await fs.writeFile(path.join(root, 'candidates.json'), JSON.stringify(candidateResults, null, 2));
          } catch (error) {
            fatal = error?.stack || String(error);
          } finally {
            await fs.writeFile(path.join(root, 'network.json'), JSON.stringify(network, null, 2)).catch(() => {});
            await fs.writeFile(path.join(root, 'events.json'), JSON.stringify(events, null, 2)).catch(() => {});
            await fs.writeFile(path.join(root, 'saved-bodies.json'), JSON.stringify(savedBodies, null, 2)).catch(() => {});
            await fs.writeFile(path.join(root, 'summary.json'), JSON.stringify({ target, initialStatus, networkEntries: network.length, candidates: candidates.size, fatal }, null, 2)).catch(() => {});
            if (fatal) await fs.writeFile(path.join(root, 'fatal-error.txt'), fatal).catch(() => {});
            if (browser) await browser.close().catch(() => {});
          }
          JS

          node /tmp/inspect-rsl-viewer.mjs

          if [ ! -s "$root/source.pdf" ]; then
            browser_pdf="$(find "$root/browser/downloads" -type f -size +100k -print0 | xargs -0 -r file | awk -F: '/PDF document/ {print $1; exit}')"
            if [ -n "$browser_pdf" ]; then
              cp "$browser_pdf" "$root/source.pdf"
              printf '%s\n' 'browser-viewer' > "$root/acquired-url.txt"
            fi
          fi

          if [ -s "$root/source.pdf" ]; then
            stat --printf='%s\n' "$root/source.pdf" > "$root/bytes.txt"
            sha256sum "$root/source.pdf" | cut -d' ' -f1 > "$root/sha256.txt"
            printf '%s\n' 'PDF-ACQUIRED' > "$root/classification.txt"
          else
            printf '%s\n' 'VIEWER-DECLARED-FREE / BYTES-NOT-YET-ACQUIRED' > "$root/classification.txt"
          fi

      - name: Verify acquired PDF and render witnesses
        if: hashFiles('rsl-description-issue-3/source.pdf') != ''
        shell: bash
        run: |
          set -euo pipefail
          root='rsl-description-issue-3'
          qpdf --warning-exit-0 --check "$root/source.pdf" > "$root/qpdf-check.txt" 2>&1
          pdfinfo "$root/source.pdf" > "$root/pdfinfo.txt"
          pdftotext -layout "$root/source.pdf" "$root/full-text.txt" || true
          touch "$root/full-text.txt"
          pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' "$root/pdfinfo.txt")"
          test "$pages" -gt 250
          front_end=18
          [ "$pages" -lt "$front_end" ] && front_end="$pages"
          pdftoppm -f 1 -l "$front_end" -jpeg -scale-to 1600 "$root/source.pdf" "$root/front/page" >/dev/null 2>&1
          final_start=$((pages - 9))
          [ "$final_start" -lt 1 ] && final_start=1
          pdftoppm -f "$final_start" -l "$pages" -jpeg -scale-to 1500 "$root/source.pdf" "$root/final/page" >/dev/null 2>&1
          printf 'pages=%s\ntext_bytes=%s\n' "$pages" "$(wc -c < "$root/full-text.txt")" > "$root/verification-summary.txt"

      - name: Upload RSL verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-mayakovsky-description-rsl-verification
          path: |
            rsl-description-issue-3/record-headers.txt
            rsl-description-issue-3/record.html
            rsl-description-issue-3/action-record-headers.txt
            rsl-description-issue-3/action-record.js
            rsl-description-issue-3/direct-attempts.tsv
            rsl-description-issue-3/direct-result.txt
            rsl-description-issue-3/acquired-url.txt
            rsl-description-issue-3/classification.txt
            rsl-description-issue-3/bytes.txt
            rsl-description-issue-3/sha256.txt
            rsl-description-issue-3/qpdf-check.txt
            rsl-description-issue-3/pdfinfo.txt
            rsl-description-issue-3/full-text.txt
            rsl-description-issue-3/verification-summary.txt
            rsl-description-issue-3/front/*.jpg
            rsl-description-issue-3/final/*.jpg
            rsl-description-issue-3/browser
          if-no-files-found: warn
          retention-days: 14

      - name: Upload raw RSL PDF
        if: hashFiles('rsl-description-issue-3/source.pdf') != ''
        uses: actions/upload-artifact@v4
        with:
          name: source-49-mayakovsky-description-rsl-raw
          path: rsl-description-issue-3/source.pdf
          retention-days: 7
          compression-level: 0
