name: Source acquisition 49 Pro eto SHPL static resolver

on:
  push:
    branches:
      - research/source-acquisition-49
    paths:
      - .github/workflows/source-acquisition-49-pro-eto-shpl-static.yml
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
    paths:
      - .github/workflows/source-acquisition-49-pro-eto-shpl-static.yml
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-pro-eto-shpl-static-${{ github.ref }}
  cancel-in-progress: true

jobs:
  resolve-pages:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick python3-pil python3-requests

      - name: Resolve and download all official Docview pages
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p shpl-pro-eto/images/all shpl-pro-eto/images/best shpl-pro-eto/endpoints shpl-pro-eto/contact-sheets

          cat > /tmp/resolve-shpl.py <<'PY'
          from __future__ import annotations

          import concurrent.futures
          import hashlib
          import io
          import json
          import pathlib
          import re
          import shutil
          import time
          from typing import Any
          from urllib.parse import urljoin

          import requests
          from PIL import Image
          from requests.adapters import HTTPAdapter
          from urllib3.util.retry import Retry

          ROOT = pathlib.Path('shpl-pro-eto')
          BASE = 'http://elib.shpl.ru'
          NODE_PATH = '/ru/nodes/3515-mayakovskiy-v-v-pro-eto-m-pg-gos-izd-vo-1923'
          NODE_URL = BASE + NODE_PATH
          UA = 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36 source-verifier/4.0'

          session = requests.Session()
          retry = Retry(
              total=3,
              connect=3,
              read=3,
              backoff_factor=0.5,
              status_forcelist=(429, 500, 502, 503, 504),
              allowed_methods=frozenset({'GET'}),
          )
          adapter = HTTPAdapter(max_retries=retry, pool_connections=24, pool_maxsize=24)
          session.mount('http://', adapter)
          session.mount('https://', adapter)
          session.headers.update({'User-Agent': UA})

          def save_json(name: str, value: Any) -> None:
              (ROOT / name).write_text(
                  json.dumps(value, ensure_ascii=False, indent=2) + '\n',
                  encoding='utf-8',
              )

          def extract_docview(text: str) -> dict[str, Any]:
              marker_index = text.find('initDocview(')
              if marker_index < 0:
                  raise RuntimeError('initDocview payload not found')
              start = text.find('{', marker_index)
              if start < 0:
                  raise RuntimeError('initDocview object start not found')
              depth = 0
              quoted = False
              quote = ''
              escaped = False
              for index in range(start, len(text)):
                  char = text[index]
                  if quoted:
                      if escaped:
                          escaped = False
                      elif char == '\\':
                          escaped = True
                      elif char == quote:
                          quoted = False
                      continue
                  if char in ('"', "'"):
                      quoted = True
                      quote = char
                  elif char == '{':
                      depth += 1
                  elif char == '}':
                      depth -= 1
                      if depth == 0:
                          return json.loads(text[start:index + 1])
              raise RuntimeError('initDocview object end not found')

          node_response = session.get(NODE_URL, timeout=(20, 180), allow_redirects=True)
          node_response.raise_for_status()
          (ROOT / 'node.html').write_bytes(node_response.content)
          (ROOT / 'node-headers.json').write_text(
              json.dumps(dict(node_response.headers), ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          options = extract_docview(node_response.text)
          pages = options.get('pages') or []
          if len(pages) != 70:
              raise RuntimeError(f'expected 70 physical scans, found {len(pages)}')
          page_ids = [int(page['id']) for page in pages]
          save_json('docview-options.json', options)
          (ROOT / 'page-ids.txt').write_text(
              ''.join(f'{page_id}\n' for page_id in page_ids),
              encoding='utf-8',
          )

          prefix_to_page: dict[str, int] = {}
          candidates: dict[str, dict[str, Any]] = {}

          def normalize_url(value: str) -> str | None:
              value = value.strip().replace('\\/', '/').replace('&amp;', '&')
              value = value.rstrip('"\' ,;}])')
              if value.startswith('//'):
                  value = 'http:' + value
              elif value.startswith('/'):
                  value = urljoin(BASE, value)
              if not value.startswith(('http://', 'https://')):
                  return None
              if not re.search(r'(?:/images/|\.jpe?g(?:\?|$)|\.png(?:\?|$)|\.webp(?:\?|$))', value, re.I):
                  return None
              return value

          def add_candidate(value: str, origin: str, page_id: int | None = None) -> None:
              url = normalize_url(value)
              if not url:
                  return
              if page_id is None:
                  for prefix, mapped_page in prefix_to_page.items():
                      if prefix in url:
                          page_id = mapped_page
                          break
              key = hashlib.sha256(url.encode()).hexdigest()
              item = candidates.setdefault(key, {
                  'url': url,
                  'origins': [],
                  'page_ids': [],
              })
              if origin not in item['origins']:
                  item['origins'].append(origin)
              if page_id is not None and page_id not in item['page_ids']:
                  item['page_ids'].append(page_id)

          static_links: list[dict[str, Any]] = []
          for zoom_key in ('links_z0', 'links_z1', 'links_z2'):
              for page_id_text, value in (options.get(zoom_key) or {}).items():
                  page_id = int(page_id_text)
                  static_links.append({'page_id': page_id, 'origin': zoom_key, 'url': value})
                  path_match = re.search(r'(/system/pages/\d{3}/\d{3}/\d{2}/)', value)
                  if path_match:
                      prefix_to_page[path_match.group(1)] = page_id
                  add_candidate(str(value), zoom_key, page_id)
          save_json('static-links.json', static_links)

          auxiliary: list[dict[str, Any]] = []
          for label, path in (
              ('docview-script', options.get('script_path')),
              ('application-js', re.search(r'<script[^>]+src=["\']([^"\']*application-[^"\']+\.js)', node_response.text, re.I).group(1)
               if re.search(r'<script[^>]+src=["\']([^"\']*application-[^"\']+\.js)', node_response.text, re.I) else None),
          ):
              if not path:
                  continue
              url = urljoin(BASE, str(path))
              try:
                  response = session.get(url, headers={'Referer': NODE_URL}, timeout=(15, 120))
                  body = response.content
                  filename = f'{label}.txt'
                  (ROOT / filename).write_bytes(body)
                  auxiliary.append({
                      'label': label,
                      'url': url,
                      'status': response.status_code,
                      'bytes': len(body),
                      'content_type': response.headers.get('content-type', ''),
                  })
              except Exception as error:
                  auxiliary.append({'label': label, 'url': url, 'error': repr(error)})
          save_json('auxiliary-responses.json', auxiliary)

          endpoint_specs = [
              (page_id, kind, f'{BASE}/ru/pages/{page_id}' + ('/read' if kind == 'read' else ''))
              for page_id in page_ids
              for kind in ('read', 'page')
          ]

          def fetch_endpoint(spec: tuple[int, str, str]) -> dict[str, Any]:
              page_id, kind, url = spec
              started = time.monotonic()
              try:
                  response = session.get(
                      url,
                      headers={
                          'Referer': NODE_URL,
                          'X-Requested-With': 'XMLHttpRequest',
                          'Accept': 'application/json, text/javascript, */*; q=0.01',
                      },
                      timeout=(10, 35),
                  )
                  body = response.content
                  filename = f'{kind}-{page_id}.txt'
                  (ROOT / 'endpoints' / filename).write_bytes(body)
                  return {
                      'page_id': page_id,
                      'kind': kind,
                      'url': url,
                      'status': response.status_code,
                      'bytes': len(body),
                      'content_type': response.headers.get('content-type', ''),
                      'elapsed': round(time.monotonic() - started, 3),
                      'filename': filename,
                  }
              except Exception as error:
                  return {
                      'page_id': page_id,
                      'kind': kind,
                      'url': url,
                      'error': repr(error),
                      'elapsed': round(time.monotonic() - started, 3),
                  }

          with concurrent.futures.ThreadPoolExecutor(max_workers=18) as executor:
              endpoint_results = list(executor.map(fetch_endpoint, endpoint_specs))
          save_json('endpoint-results.json', endpoint_results)

          url_pattern = re.compile(r'(?:https?:)?//[^\s"\'<>]+|/system/pages/[^\s"\'<>]+', re.I)
          for result in endpoint_results:
              filename = result.get('filename')
              if not filename:
                  continue
              source = ROOT / 'endpoints' / str(filename)
              text = source.read_text(encoding='utf-8', errors='replace')
              for match in url_pattern.finditer(text):
                  add_candidate(match.group(0), f"endpoint:{result['kind']}", int(result['page_id']))

          for auxiliary_file in ('docview-script.txt', 'application-js.txt'):
              source = ROOT / auxiliary_file
              if not source.exists():
                  continue
              text = source.read_text(encoding='utf-8', errors='replace')
              for match in url_pattern.finditer(text):
                  add_candidate(match.group(0), auxiliary_file)

          candidate_values = sorted(candidates.values(), key=lambda item: item['url'])
          save_json('candidate-images.json', candidate_values)

          def download_candidate(index_item: tuple[int, dict[str, Any]]) -> dict[str, Any]:
              index, item = index_item
              url = str(item['url'])
              started = time.monotonic()
              result: dict[str, Any] = {
                  'index': index,
                  'url': url,
                  'origins': item['origins'],
                  'page_ids': item['page_ids'],
              }
              try:
                  response = session.get(url, headers={'Referer': NODE_URL}, timeout=(10, 75))
                  body = response.content
                  result.update({
                      'status': response.status_code,
                      'bytes': len(body),
                      'content_type': response.headers.get('content-type', ''),
                      'elapsed': round(time.monotonic() - started, 3),
                  })
                  if response.status_code != 200 or len(body) < 1000:
                      return result
                  try:
                      with Image.open(io.BytesIO(body)) as image:
                          width, height = image.size
                          image_format = (image.format or 'JPEG').lower()
                  except Exception as error:
                      result['image_error'] = repr(error)
                      return result
                  extension = 'jpg' if image_format in ('jpeg', 'jpg') else image_format
                  filename = f'{index:04d}.{extension}'
                  target = ROOT / 'images' / 'all' / filename
                  target.write_bytes(body)
                  result.update({
                      'file': str(target),
                      'width': width,
                      'height': height,
                      'area': width * height,
                      'sha256': hashlib.sha256(body).hexdigest(),
                  })
                  return result
              except Exception as error:
                  result['error'] = repr(error)
                  result['elapsed'] = round(time.monotonic() - started, 3)
                  return result

          with concurrent.futures.ThreadPoolExecutor(max_workers=16) as executor:
              download_results = list(executor.map(download_candidate, enumerate(candidate_values, start=1)))
          save_json('download-manifest.json', download_results)

          best_manifest: list[dict[str, Any]] = []
          for sequence, page_id in enumerate(page_ids, start=1):
              matching = [
                  item for item in download_results
                  if page_id in item.get('page_ids', []) and item.get('area', 0) > 0 and item.get('file')
              ]
              matching.sort(key=lambda item: (item.get('area', 0), item.get('bytes', 0)), reverse=True)
              if not matching:
                  best_manifest.append({'sequence': sequence, 'page_id': page_id, 'status': 'missing'})
                  continue
              chosen = matching[0]
              source = pathlib.Path(str(chosen['file']))
              extension = source.suffix or '.jpg'
              target = ROOT / 'images' / 'best' / f'{sequence:03d}-page-{page_id}{extension}'
              shutil.copyfile(source, target)
              best_manifest.append({
                  'sequence': sequence,
                  'page_id': page_id,
                  'status': 'downloaded',
                  'file': str(target),
                  'width': chosen['width'],
                  'height': chosen['height'],
                  'bytes': chosen['bytes'],
                  'sha256': chosen['sha256'],
                  'url': chosen['url'],
                  'origins': chosen['origins'],
                  'candidate_count': len(matching),
              })
          save_json('best-page-manifest.json', best_manifest)

          downloaded = [item for item in best_manifest if item['status'] == 'downloaded']
          summary = {
              'physical_scans': len(page_ids),
              'static_links': len(static_links),
              'endpoint_requests': len(endpoint_results),
              'endpoint_success_200': sum(1 for item in endpoint_results if item.get('status') == 200),
              'candidate_urls': len(candidate_values),
              'downloaded_candidate_images': sum(1 for item in download_results if item.get('area', 0) > 0),
              'best_pages_downloaded': len(downloaded),
              'best_pages_missing': len(page_ids) - len(downloaded),
              'min_dimensions': [
                  min((item['width'] for item in downloaded), default=0),
                  min((item['height'] for item in downloaded), default=0),
              ],
              'max_dimensions': [
                  max((item['width'] for item in downloaded), default=0),
                  max((item['height'] for item in downloaded), default=0),
              ],
              'total_best_bytes': sum(item['bytes'] for item in downloaded),
          }
          save_json('acquisition-summary.json', summary)
          print(json.dumps(summary, ensure_ascii=False, indent=2))
          if len(downloaded) != 70:
              raise RuntimeError(f"only {len(downloaded)} of 70 official page scans acquired")
          PY

          python3 /tmp/resolve-shpl.py

      - name: Build visual contact sheets
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          count="$(find shpl-pro-eto/images/best -type f | wc -l)"
          printf 'best_page_files=%s\n' "$count" > shpl-pro-eto/best-page-count.txt
          if [ "$count" -gt 0 ]; then
            montage shpl-pro-eto/images/best/* -thumbnail 260x -tile 10x -geometry +6+6 shpl-pro-eto/contact-sheets/all-pages.jpg
            for start in 1 21 41 61; do
              end=$((start + 19))
              mapfile -t files < <(find shpl-pro-eto/images/best -type f -printf '%f\n' | sort | awk -v s="$start" -v e="$end" 'NR>=s && NR<=e {print "shpl-pro-eto/images/best/"$0}')
              if [ "${#files[@]}" -gt 0 ]; then
                printf -v label '%03d-%03d' "$start" "$end"
                montage "${files[@]}" -thumbnail 420x -tile 5x -geometry +8+8 "shpl-pro-eto/contact-sheets/pages-$label.jpg"
              fi
            done
          fi

      - name: Upload SHPL verification bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-shpl-static-verification
          path: |
            shpl-pro-eto/node-headers.json
            shpl-pro-eto/node.html
            shpl-pro-eto/docview-options.json
            shpl-pro-eto/page-ids.txt
            shpl-pro-eto/static-links.json
            shpl-pro-eto/auxiliary-responses.json
            shpl-pro-eto/docview-script.txt
            shpl-pro-eto/application-js.txt
            shpl-pro-eto/endpoints/*.txt
            shpl-pro-eto/endpoint-results.json
            shpl-pro-eto/candidate-images.json
            shpl-pro-eto/download-manifest.json
            shpl-pro-eto/best-page-manifest.json
            shpl-pro-eto/acquisition-summary.json
            shpl-pro-eto/best-page-count.txt
            shpl-pro-eto/contact-sheets/*.jpg
          if-no-files-found: warn
          retention-days: 14

      - name: Upload official page scans
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-pro-eto-shpl-page-scans
          path: shpl-pro-eto/images/best
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
