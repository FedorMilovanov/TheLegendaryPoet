name: Integrate current main into research

on:
  push:
    branches: [integration/research-main-20260723]

permissions:
  contents: write

concurrency:
  group: integrate-research-main
  cancel-in-progress: false

jobs:
  merge-and-verify:
    if: ${{ !contains(github.event.head_commit.message, 'Integrate verified research with current audio and archive main') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: integration/research-main-20260723
          fetch-depth: 0
          show-progress: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - name: Merge main without choosing a global side
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge --no-commit --no-ff origin/main || true

          resolve() {
            local side="$1"
            local file="$2"
            if git diff --name-only --diff-filter=U | grep -Fqx "$file"; then
              git checkout "--$side" -- "$file"
              git add -- "$file"
            fi
          }

          ours=(
            .github/workflows/ci.yml
            package.json
            public/sitemap.xml
            scripts/gen-sitemap.mjs
            scripts/prerender-og.mjs
            scripts/validate-route-chunks.ts
            src/App.tsx
            src/components/Header.tsx
            src/components/MobileDock.tsx
            src/components/command/commandItems.ts
            src/data/library/index.ts
            src/data/poets.ts
            src/lib/routeModules.ts
            src/main.tsx
            src/pages/PoetsPage.tsx
            src/reduced-motion.css
            src/types/poet.ts
          )
          for file in "${ours[@]}"; do resolve ours "$file"; done

          theirs=(
            docs/COMMENTS_SETUP.md
            src/components/poet-detail/PoemCard.tsx
            src/pages/MusicPage.tsx
            src/pages/MyArchivePage.tsx
          )
          for file in "${theirs[@]}"; do resolve theirs "$file"; done

          unresolved="$(git diff --name-only --diff-filter=U)"
          if [[ -n "$unresolved" ]]; then
            echo "Unresolved conflicts require an explicit decision:" >&2
            echo "$unresolved" >&2
            exit 1
          fi

          git status --short

      - name: Install dependencies
        run: npm ci --silent
      - name: Validate research, audio, music and archive contracts
        run: |
          npm run check
          npm run validate:audio
      - name: Generate and validate production output
        env:
          VITE_BASE: /
        run: |
          npm run sitemap
          npm run build
          npm run validate:route-chunks
          npm run prerender
          npm run validate:prerender-seo
      - name: Run full desktop and Pixel 7 article QA
        run: npm run test:e2e
      - name: Commit the verified merge
        shell: bash
        run: |
          set -euo pipefail
          git add -A
          git commit -m "Integrate verified research with current audio and archive main"
          git push origin HEAD:integration/research-main-20260723
