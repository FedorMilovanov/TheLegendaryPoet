name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; don't cancel an in-progress publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Validate content, source boundaries, stores, shell, literary style, and types
        run: npm run check

      - name: Validate required physical audio assets
        run: npm run validate:audio

      - name: Generate sitemap
        run: npm run sitemap

      - name: Build
        run: npm run build
        env:
          # The custom domain serves the Pages artifact from the site root.
          VITE_BASE: /
          # Optional shared comments/ratings backend (Supabase). Leave the repo
          # Variables unset to keep the local-only store. The anon key is public
          # by design (protected by Row Level Security) — repo Variables, not
          # Secrets, so Vite can inline it at build time. See docs/COMMENTS_SETUP.md.
          VITE_SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.SUPABASE_ANON_KEY }}

      - name: Validate route code splitting
        run: npm run validate:route-chunks

      - name: Validate production route and asset budgets
        run: npm run validate:build-output

      - name: Prerender public routes and noindex fallback
        run: npm run prerender

      - name: Validate prerendered SEO and JSON-LD
        run: npm run validate:prerender-seo

      - name: Verify generated sitemap is committed and stable
        run: git diff --exit-code -- public/sitemap.xml

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
