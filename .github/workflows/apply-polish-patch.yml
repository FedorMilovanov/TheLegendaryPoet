name: Apply article polish patch

on:
  push:
    branches:
      - work/local-images-playwright-wtoc
    paths:
      - tools/polish-patch/**
      - .github/workflows/apply-polish-patch.yml
  pull_request:
    branches:
      - main
    paths:
      - tools/polish-patch/**
      - .github/workflows/apply-polish-patch.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-article-polish
  cancel-in-progress: true

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/local-images-playwright-wtoc
          fetch-depth: 0

      - name: Reconstruct and verify patch
        run: |
          cat tools/polish-patch/part-* | base64 --decode | gzip --decompress > /tmp/polish.patch
          git apply --check /tmp/polish.patch
          git apply /tmp/polish.patch
          python - <<'PY'
          from pathlib import Path

          def replace_required(path: Path, old: str, new: str, label: str) -> None:
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f'Expected {label} was not found in {path}')
              path.write_text(text.replace(old, new, 1))

          catalog = Path('scripts/essay-image-catalog.mjs')
          replace_required(
              catalog,
              'https://commons.wikimedia.org/wiki/Special:Redirect/file/Baryshnya_i_khuligan_Vladimir_Mayakovsky%2C_Alexandra_Rebikova%29.jpg',
              'https://upload.wikimedia.org/wikipedia/commons/e/ed/Baryshnya_i_khuligan_Vladimir_Mayakovsky%2C_Alexandra_Rebikova%29.jpg',
              'stable film-still URL',
          )

          localizer = Path('scripts/localize-essay-images.mjs')
          localizer_text = localizer.read_text().replace('fetch(encodeURI(url), {', 'fetch(url, {')
          needle = "      await encodeVariant(input, `${base}${suffix}.webp`, width, 'webp');"
          replacement = "      const webpPath = `${base}${suffix}.webp`;\n      if (webpPath !== source) await encodeVariant(input, webpPath, width, 'webp');"
          if needle not in localizer_text:
              raise SystemExit('Expected local WebP encoder line was not found')
          localizer.write_text(localizer_text.replace(needle, replacement, 1))

          index = Path('src/data/essays/index.ts')
          replace_required(
              index,
              """  cover: '/images/essays/mayakovsky/mayakovsky-part-1-hero.webp',
            cardCover: '/images/essays/mayakovsky/mayakovsky-part-1-hero.webp',
            coverAlt: 'Молодой Владимир Маяковский — художественная реконструкция на основе архивных портретов',
            coverKind: 'reconstruction',
            coverCredit: 'THE LEGENDARY POET',""",
              """  cover: '/images/essays/archive/mayakovsky-1914.webp',
            cardCover: '/images/essays/archive/mayakovsky-1914.webp',
            coverAlt: 'Молодой Владимир Маяковский. Архивный портрет, 1914 год',
            coverKind: 'archive',
            coverCredit: 'Wikimedia Commons · 1914',
            coverSourceUrl: 'https://commons.wikimedia.org/wiki/File:Vladimir_Mayakovsky_1914.jpg',""",
              'Mayakovsky part I cover configuration',
          )
          replace_required(
              index,
              """  cover: '/images/essays/mayakovsky/mayakovsky-part-2-hero.webp',
            cardCover: '/images/essays/mayakovsky/mayakovsky-part-2-hero.webp',
            coverAlt: 'Поздний Владимир Маяковский — цифровая реставрация архивного портрета 1928 года',
            coverKind: 'restoration',
            coverCredit: 'Осип Брик · реставрация проекта',""",
              """  cover: '/images/essays/archive/mayakovsky-1928-osip.webp',
            cardCover: '/images/essays/archive/mayakovsky-1928-osip.webp',
            coverAlt: 'Владимир Маяковский. Фотография Осипа Брика, 1928 год',
            coverKind: 'archive',
            coverCredit: 'Осип Брик · 1928',""",
              'Mayakovsky part II cover configuration',
          )

          brik = Path('src/data/essays/brikCaseVisual.ts')
          brik_text = brik.read_text().replace(
              "'/images/essays/briks/brik-archive-hero.webp'",
              "'/images/essays/archive/lilya-gendrikov-1929.webp'",
          )
          if brik_text == brik.read_text():
              raise SystemExit('Expected Brik cover path was not found')
          brik.write_text(brik_text)

          part_two = Path('src/data/essays/mayakovskyPartTwoVisual.ts')
          restoration_block = """    {
                type: 'image',
                src: '/images/essays/mayakovsky/mayakovsky-part-2-hero.webp',
                alt: 'Цифровая реставрация портрета Владимира Маяковского работы Осипа Брика, 1928 год',
                caption: 'Тот же кадр после бережной цифровой реставрации.',
                credit: 'Осип Брик; реставрация THE LEGENDARY POET',
                sourceUrl: 'https://commons.wikimedia.org/wiki/File:Mayakovsky_1928_by_Osip_Brik.jpg',
                kind: 'restoration',
                layout: 'portrait',
                objectPosition: '50% 18%',
              },
          """
          replace_required(part_two, restoration_block, '', 'obsolete corrupt restoration block')
          PY

          rm -f \
            public/images/essays/briks/brik-archive-hero.webp \
            public/images/essays/briks/lilya-brik-1914.webp \
            public/images/essays/briks/osip-brik-1928.webp \
            public/images/essays/mayakovsky/mayakovsky-part-1-hero.webp \
            public/images/essays/mayakovsky/mayakovsky-part-2-hero.webp

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install project and image tooling
        run: |
          npm ci
          npm install --no-save sharp@0.35.3

      - id: media
        name: Download and optimize article media
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm run images:sync 2>&1 | tee /tmp/images-sync.log

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: article-media-sync-log
          path: /tmp/images-sync.log
          retention-days: 1

      - name: Stop after media failure
        if: steps.media.outcome == 'failure'
        run: exit 1

      - name: Commit polished article engine
        run: |
          rm -rf tools/polish-patch
          rm -f .github/workflows/apply-polish-patch.yml
          rm -f .github/workflows/export-worktree.yml
          git add -A
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "feat: localize article media and add Playwright QA"
          git push origin HEAD:work/local-images-playwright-wtoc
