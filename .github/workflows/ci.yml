name: Audit poet profile conclusions

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-unmerged-essays

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Capture corrected profile audit report
        run: |
          set +e
          {
            npx tsx scripts/fix-profile-audit-script.ts
            npx tsx scripts/fix-profile-audit-syntax.ts
            npx tsx scripts/strengthen-profile-conclusions.ts
          } > profile-audit-report.txt 2>&1
          echo $? > profile-audit-status.txt
          set -e

      - uses: actions/upload-artifact@v4
        with:
          name: profile-audit-anchor-report
          path: |
            profile-audit-report.txt
            profile-audit-status.txt

      - name: Require successful profile audit
        run: test "$(cat profile-audit-status.txt)" = "0"
