name: Diagnose latest editorial theology

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-unmerged-essays

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply editorial and theological clarifications
        run: npx tsx scripts/apply-latest-editorial-theology.ts

      - name: Capture validation report
        run: |
          set +e
          npm run check > validation-report.txt 2>&1
          status=$?
          echo "$status" > validation-status.txt
          exit 0

      - uses: actions/upload-artifact@v4
        with:
          name: latest-editorial-theology-validation
          path: |
            validation-report.txt
            validation-status.txt

      - name: Require successful validation
        run: test "$(cat validation-status.txt)" = "0"
