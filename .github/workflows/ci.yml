name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Validate poet library
        run: npm run validate:library
      - name: Validate essays
        run: npm run validate:essays
      - name: Validate literary style
        run: |
          set -o pipefail
          npx tsx scripts/validate-literary-style.ts 2>&1 | tee literary-style.log
      - name: Upload literary validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: literary-style-report
          path: literary-style.log
          if-no-files-found: ignore
      - name: Typecheck
        run: npm run typecheck
      - name: Generate sitemap
        run: npm run sitemap
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
      - name: Prerender social pages
        run: npx tsx scripts/prerender-og.mjs
      - name: Verify generated output is stable
        run: git diff --exit-code -- public/sitemap.xml
