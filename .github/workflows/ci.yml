name: Polish poet card bios

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  polish:
    if: github.head_ref == 'agent/integrate-unmerged-essays'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Apply card bio polish
        run: npx tsx scripts/polish-card-bios.ts
      - name: Validate polished content
        run: |
          npm run check
          npm run sitemap
          npm run build
          npm run prerender
        env:
          VITE_BASE: /
      - name: Commit polished card bios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/library/alexanderPushkin.ts src/data/library/mikhailLermontov.ts src/data/library/sergeiYesenin.ts src/data/library/annaAkhmatova.ts scripts/validate-literary-style.ts
          git commit -m "Polish poet card biographies"
          git push origin HEAD:${{ github.head_ref }}
