name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Validate content, stores, and literary style
        run: npm run check:content
      - name: Validate persistent app shell invariants
        run: npm run validate:app-shell
      - name: Validate overlays, images, and pointer interactions
        id: interaction_runtime
        run: |
          set +e
          npm run validate:interaction-runtime > interaction-runtime.log 2>&1
          status=$?
          cat interaction-runtime.log
          exit $status
      - name: Upload interaction runtime diagnostics
        if: ${{ failure() && steps.interaction_runtime.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: interaction-runtime-diagnostics
          path: interaction-runtime.log
          if-no-files-found: error
          retention-days: 3
      - name: Typecheck
        id: typecheck
        run: |
          set +e
          npm run typecheck > typecheck.log 2>&1
          status=$?
          cat typecheck.log
          exit $status
      - name: Upload typecheck diagnostics
        if: ${{ failure() && steps.typecheck.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: error
          retention-days: 3
      - name: Generate sitemap
        run: npm run sitemap
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
      - name: Validate route splitting and production asset budgets
        id: build_audit
        run: |
          set +e
          npm run validate:build-output > build-output-audit.log 2>&1
          status=$?
          cat build-output-audit.log
          exit $status
      - name: Upload build audit diagnostics
        if: ${{ failure() && steps.build_audit.outcome == 'failure' }}
        uses: actions/upload-artifact@v4
        with:
          name: build-output-audit
          path: build-output-audit.log
          if-no-files-found: error
          retention-days: 3
      - name: Prerender social pages
        run: npm run prerender
      - name: Verify generated output is stable
        run: git diff --exit-code -- public/sitemap.xml
