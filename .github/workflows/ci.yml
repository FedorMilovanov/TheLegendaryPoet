name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Validate content, stores, and literary style
        run: npm run check:content
      - name: Validate persistent app shell invariants
        run: npm run validate:app-shell
      - name: Typecheck
        run: npm run typecheck 2>&1 | tee typecheck.log
      - name: Upload typecheck diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: typecheck-diagnostics
          path: typecheck.log
          if-no-files-found: ignore
          retention-days: 3
      - name: Generate sitemap
        run: npm run sitemap
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
      - name: Validate route splitting and production asset budgets
        run: npm run validate:build-output
      - name: Prerender social pages
        run: npm run prerender
      - name: Verify generated output is stable
        run: git diff --exit-code -- public/sitemap.xml
