name: Strengthen conclusions audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  strengthen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/integrate-unmerged-essays

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Apply 42-source conclusion audit
        run: npx tsx scripts/strengthen-conclusions-audit.ts

      - name: Capture validation report
        run: |
          set +e
          npm run check > validation-report.txt 2>&1
          echo $? > validation-status.txt
          set -e

      - uses: actions/upload-artifact@v4
        with:
          name: conclusion-audit-validation
          path: |
            validation-report.txt
            validation-status.txt

      - name: Require successful validation
        run: test "$(cat validation-status.txt)" = "0"
