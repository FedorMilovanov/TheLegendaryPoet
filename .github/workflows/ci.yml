name: Consolidate library

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  consolidate:
    if: github.head_ref == 'agent/integrate-unmerged-essays'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - name: Consolidate final poet data
        run: npx tsx scripts/consolidate-library.ts
      - name: Validate consolidated library
        run: |
          npm run validate:library
          npm run validate:essays
          npx tsx scripts/validate-literary-style.ts
          npm run typecheck
          npm run sitemap
          npm run build
        env:
          VITE_BASE: /
      - name: Commit consolidated sources
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Consolidate verified poet data into source modules"
          git push origin HEAD:${{ github.head_ref }}
