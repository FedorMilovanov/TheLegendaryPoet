name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          show-progress: false

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --silent
      - name: Validate content, media, types, and browser behavior
        run: npm run check
      - name: Generate sitemap
        run: npm run sitemap
      - name: Build
        run: npm run build
        env:
          VITE_BASE: /
      - name: Prerender social pages
        run: npm run prerender
      - name: Verify generated output is stable
        run: git diff --exit-code -- public/sitemap.xml
