name: Export worktree

on:
  push:
    branches:
      - work/local-images-playwright-wtoc
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pack repository worktree
        run: |
          tar --exclude=.git --exclude=node_modules -czf /tmp/worktree.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: legendary-poet-worktree
          path: /tmp/worktree.tar.gz
          retention-days: 1
