name: Apply article audit fixes

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'audit/playwright-total-article-check'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Apply deterministic audit fixes
        run: python scripts/apply-playwright-audit-fixes.py

      - name: Commit fixes when needed
        run: |
          if git diff --quiet; then
            echo "No audit fixes pending"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/components/essay/blocks.tsx playwright.audit.config.ts
          git commit -m "fix: repair lightbox keyboard focus trap"
          git push origin HEAD:${{ github.head_ref }}
