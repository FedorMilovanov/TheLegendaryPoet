name: Patch mobile QA one-off

on:
  push:
    branches:
      - agent/mobile-safari-android-qa-20260724
    paths:
      - .github/workflows/patch-mobile-qa-oneoff.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/mobile-safari-android-qa-20260724
          fetch-depth: 0

      - name: Apply exact QA-only replacements
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('qa/mobile-platforms.spec.mjs')
          text = path.read_text(encoding='utf-8')

          old_failure = """    const failure = request.failure()?.errorText || 'unknown failure';
              if (/ERR_ABORTED/i.test(failure)) return;
              result.localRequestFailures.push(`${request.method()} ${url}: ${failure}`);
          """
          new_failure = """    const failure = request.failure()?.errorText || 'unknown failure';
              if (/ERR_ABORTED/i.test(failure)) return;
              // WebKit cancels outstanding byte-range media requests when the SPA
              // navigates away from a playing track. That is expected teardown,
              // not a same-origin network failure; every other failure stays strict.
              if (request.resourceType() === 'media' && /cancel(?:led|ed)/i.test(failure)) return;
              result.localRequestFailures.push(`${request.method()} ${url}: ${failure}`);
          """
          old_comment = """  await expect(panel.getByText(text)).toBeVisible();
          
            await page.reload({ waitUntil: 'domcontentloaded' });
            await settle(page);
            await expect(page.getByText(text)).toBeVisible();
          """
          new_comment = """  const savedComment = panel.getByRole('article').filter({ hasText: text }).first();
            await expect(savedComment).toBeVisible();
          
            await page.reload({ waitUntil: 'domcontentloaded' });
            await settle(page);
            const reloadedComment = page.getByRole('article').filter({ hasText: text }).first();
            await expect(reloadedComment).toBeVisible();
          """

          if text.count(old_failure) != 1:
              raise SystemExit(f'Expected one request-failure block, found {text.count(old_failure)}')
          if text.count(old_comment) != 1:
              raise SystemExit(f'Expected one comment assertion block, found {text.count(old_comment)}')

          text = text.replace(old_failure, new_failure).replace(old_comment, new_comment)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate syntax and remove one-off workflow
        run: |
          node --check qa/mobile-platforms.spec.mjs
          git rm .github/workflows/patch-mobile-qa-oneoff.yml
          git diff --check

      - name: Commit QA patch
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add qa/mobile-platforms.spec.mjs
          git commit -m "Fix mobile QA comment scope and WebKit media teardown"
          git push origin HEAD:agent/mobile-safari-android-qa-20260724
