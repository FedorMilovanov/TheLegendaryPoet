name: Source acquisition 49 Yesenin death volume

on:
  push:
    branches:
      - research/source-acquisition-49
  pull_request:
    branches:
      - work/local-images-playwright-wtoc
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: source-49-yesenin-death-${{ github.ref }}
  cancel-in-progress: true

jobs:
  acquire:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - name: Install verification tools
        run: |
          sudo apt-get update
          sudo apt-get install -y curl qpdf poppler-utils unzip imagemagick

      - name: Discover and download a complete scan
        shell: bash
        run: |
          set -euo pipefail
          root="yesenin-death"
          mkdir -p "$root/candidates" "$root/front" "$root/targets" "$root/final"

          browser_ua='Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/148.0.0.0 Safari/537.36'
          klex_page='https://www.klex.ru/24ah'
          warlib_page='https://warlib.site/esenin-death/'
          warlib_pdf='https://warlib.site/wp-content/uploads/2025/12/death-of-esenin-warlib.site_.pdf'

          : > "$root/network-attempts.tsv"
          curl --fail --location --compressed --retry 4 --retry-all-errors \
            --connect-timeout 30 --max-time 300 \
            --user-agent "$browser_ua" \
            --dump-header "$root/klex-headers.txt" \
            --output "$root/klex-page.raw" \
            "$klex_page" || true

          python3 - <<'PY'
          from __future__ import annotations

          import html.parser
          import json
          import pathlib
          import urllib.parse

          root = pathlib.Path('yesenin-death')
          page_url = 'https://www.klex.ru/24ah'
          candidates: list[dict[str, str]] = []

          class Links(html.parser.HTMLParser):
              def __init__(self) -> None:
                  super().__init__()
                  self.items: list[tuple[str, str]] = []
                  self.href: str | None = None
                  self.label: list[str] = []

              def handle_starttag(self, tag: str, attrs: list[tuple[str, str | None]]) -> None:
                  if tag.lower() != 'a':
                      return
                  self.href = next((v for k, v in attrs if k.lower() == 'href' and v), None)
                  self.label = []

              def handle_data(self, data: str) -> None:
                  if self.href is not None:
                      self.label.append(data)

              def handle_endtag(self, tag: str) -> None:
                  if tag.lower() == 'a' and self.href is not None:
                      self.items.append((self.href, ''.join(self.label).strip()))
                      self.href = None
                      self.label = []

          raw = (root / 'klex-page.raw').read_bytes() if (root / 'klex-page.raw').exists() else b''
          decoded_variants: list[tuple[str, str]] = []
          for encoding in ('utf-8', 'cp1251', 'windows-1251', 'koi8-r', 'latin-1'):
              try:
                  decoded_variants.append((encoding, raw.decode(encoding)))
              except UnicodeDecodeError:
                  continue

          seen: set[str] = set()
          for encoding, text in decoded_variants:
              parser = Links()
              parser.feed(text)
              for href, label in parser.items:
                  absolute = urllib.parse.urljoin(page_url, href)
                  lowered = f'{absolute} {label}'.casefold()
                  if not any(token in lowered for token in ('.pdf', '.zip', 'pdf', 'zip', 'скач')):
                      continue
                  if absolute in seen:
                      continue
                  seen.add(absolute)
                  candidates.append({
                      'url': absolute,
                      'referer': page_url,
                      'origin': f'klex-page-{encoding}',
                      'label': label,
                  })

          guesses = [
              'https://www.klex.ru/24ah.pdf',
              'https://www.klex.ru/24ah.zip',
              'https://klex.ru/24ah.pdf',
              'https://klex.ru/24ah.zip',
              'https://warlib.site/wp-content/uploads/2025/12/death-of-esenin-warlib.site_.pdf',
          ]
          for url in guesses:
              if url in seen:
                  continue
              seen.add(url)
              candidates.append({
                  'url': url,
                  'referer': page_url if 'klex' in url else 'https://warlib.site/esenin-death/',
                  'origin': 'fallback-guess',
                  'label': '',
              })

          (root / 'candidates.json').write_text(
              json.dumps(candidates, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          with (root / 'candidates.tsv').open('w', encoding='utf-8') as handle:
              for item in candidates:
                  handle.write(f"{item['url']}\t{item['referer']}\t{item['origin']}\n")
          print(json.dumps(candidates, ensure_ascii=False, indent=2))
          PY

          found=''
          index=0
          while IFS=$'\t' read -r url referer origin; do
            index=$((index + 1))
            [ -n "$url" ] || continue
            target="$root/candidates/candidate-$index.bin"
            headers="$root/candidates/candidate-$index.headers"
            code=0
            curl --fail --location --compressed --retry 3 --retry-all-errors \
              --connect-timeout 30 --max-time 3600 \
              --user-agent "$browser_ua" \
              --referer "$referer" \
              --cookie-jar "$root/cookies.txt" --cookie "$root/cookies.txt" \
              --dump-header "$headers" \
              --output "$target" \
              "$url" || code=$?
            bytes=0
            [ -f "$target" ] && bytes="$(stat --printf='%s' "$target")"
            printf '%s\t%s\t%s\t%s\t%s\n' "$index" "$code" "$bytes" "$origin" "$url" >> "$root/network-attempts.tsv"
            if [ "$code" -ne 0 ] || [ ! -s "$target" ]; then
              continue
            fi
            if [ "$(head -c 5 "$target")" = '%PDF-' ]; then
              cp "$target" "$root/source.pdf"
              found="$url"
              break
            fi
            if unzip -t "$target" >/dev/null 2>&1; then
              unzip -o "$target" -d "$root/candidates/unpacked-$index" >/dev/null
              pdf="$(find "$root/candidates/unpacked-$index" -type f -iname '*.pdf' -print -quit)"
              if [ -n "$pdf" ] && [ "$(head -c 5 "$pdf")" = '%PDF-' ]; then
                cp "$pdf" "$root/source.pdf"
                found="$url"
                break
              fi
            fi
          done < "$root/candidates.tsv"

          if [ -z "$found" ]; then
            echo 'No complete PDF candidate was acquired.' >&2
            exit 1
          fi

          printf '%s\n' "$found" > "$root/acquired-url.txt"
          stat --printf='%s\n' "$root/source.pdf" > "$root/bytes.txt"
          sha256sum "$root/source.pdf" | cut -d' ' -f1 > "$root/sha256.txt"

      - name: Verify pagination and extract evidence
        shell: bash
        run: |
          set -euo pipefail
          root="yesenin-death"
          qpdf --check "$root/source.pdf" > "$root/qpdf-check.txt" 2>&1
          pdfinfo "$root/source.pdf" > "$root/pdfinfo.txt"
          pdftotext -layout "$root/source.pdf" "$root/full-text.txt"
          pages="$(awk -F: '/^Pages:/ {gsub(/ /, "", $2); print $2}' "$root/pdfinfo.txt")"
          test "$pages" -gt 300

          front_end=14
          [ "$pages" -lt "$front_end" ] && front_end="$pages"
          pdftoppm -f 1 -l "$front_end" -jpeg -r 125 "$root/source.pdf" "$root/front/page" >/dev/null 2>&1

          for printed in 53 68 79 83 88 92 96 102 134 155 162 368 376 392 393 394; do
            for delta in 0 1 2 3 4; do
              pdf_page=$((printed + delta))
              [ "$pdf_page" -le "$pages" ] || continue
              printf -v label '%03d-plus-%d' "$printed" "$delta"
              pdftoppm -f "$pdf_page" -l "$pdf_page" -singlefile -jpeg -r 120 \
                "$root/source.pdf" "$root/targets/$label" >/dev/null 2>&1
            done
          done

          final_start=$((pages - 7))
          [ "$final_start" -lt 1 ] && final_start=1
          pdftoppm -f "$final_start" -l "$pages" -jpeg -r 120 \
            "$root/source.pdf" "$root/final/page" >/dev/null 2>&1

          python3 - <<'PY'
          from __future__ import annotations

          import json
          import pathlib
          import re

          root = pathlib.Path('yesenin-death')
          pages = (root / 'full-text.txt').read_text(encoding='utf-8', errors='replace').split('\f')
          terms = [
              'Заключение специалиста',
              'Погибко',
              'Майлис',
              'Дегтярев',
              'Заключение экспертов',
              'Дедов',
              'акт осмотра',
              'Гиляревский',
              'судебно-медицин',
              'протокол',
              'Материалы о болезни и смерти',
              'кровью',
          ]
          evidence: dict[str, list[dict[str, object]]] = {}
          for term in terms:
              pattern = re.compile(re.escape(term), re.I)
              hits: list[dict[str, object]] = []
              for number, page in enumerate(pages, start=1):
                  match = pattern.search(page)
                  if not match:
                      continue
                  start = max(0, match.start() - 300)
                  end = min(len(page), match.end() + 650)
                  hits.append({
                      'pdf_page': number,
                      'excerpt': ' '.join(page[start:end].split()),
                  })
                  if len(hits) >= 30:
                      break
              evidence[term] = hits
          (root / 'targeted-evidence.json').write_text(
              json.dumps(evidence, ensure_ascii=False, indent=2) + '\n',
              encoding='utf-8',
          )
          PY

          printf 'pages=%s\ntext_bytes=%s\n' "$pages" "$(wc -c < "$root/full-text.txt")" > "$root/summary.txt"

      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-yesenin-death-verification
          path: |
            yesenin-death/acquired-url.txt
            yesenin-death/bytes.txt
            yesenin-death/sha256.txt
            yesenin-death/qpdf-check.txt
            yesenin-death/pdfinfo.txt
            yesenin-death/full-text.txt
            yesenin-death/targeted-evidence.json
            yesenin-death/summary.txt
            yesenin-death/network-attempts.tsv
            yesenin-death/candidates.json
            yesenin-death/klex-headers.txt
            yesenin-death/candidates/*.headers
            yesenin-death/front/*.jpg
            yesenin-death/targets/*.jpg
            yesenin-death/final/*.jpg
          if-no-files-found: warn
          retention-days: 14

      - name: Upload raw source
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: source-49-yesenin-death-raw
          path: yesenin-death/source.pdf
          if-no-files-found: warn
          retention-days: 7
          compression-level: 0
